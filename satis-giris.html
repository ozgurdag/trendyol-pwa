<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Satış Girişi · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
</head>
<body>
<div class="app-shell">

  <div class="topbar">
    <div class="topbar-title">🛒 Satış Girişi</div>
    <div id="tarih-goster" style="font-size:12px;color:var(--t3)"></div>
    <div class="topbar-action" onclick="excelIndir()">⬇</div>
  </div>

  <div class="page-content">

    <!-- BUGÜN ÖZETİ -->
    <div class="stat-grid mb-16">
      <div class="stat-card">
        <div class="stat-label">Bugün Satılan</div>
        <div class="stat-value accent" id="ozet-adet">0</div>
        <div class="stat-sub">adet</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tahmini Kar</div>
        <div class="stat-value green" id="ozet-kar">0₺</div>
        <div class="stat-sub">net</div>
      </div>
    </div>

    <!-- SATIŞ EKLE -->
    <div class="card mb-16">
      <div class="card-title mb-16">Satış Ekle</div>

      <div class="form-group">
        <label class="form-label">Ürün Seç</label>
        <select class="form-select" id="satis-urun">
          <option value="">— Ürün seçin —</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Adet</label>
          <input class="form-input" type="number" id="satis-adet" value="1" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Tarih</label>
          <input class="form-input" type="date" id="satis-tarih">
        </div>
      </div>

      <!-- Seçilen ürün özeti -->
      <div id="secilen-ozet" style="display:none;background:var(--bg3);border-radius:var(--r-md);padding:12px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px">
          <span style="color:var(--t3)">Mevcut Stok</span>
          <span id="secilen-stok" style="font-weight:600"></span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:6px">
          <span style="color:var(--t3)">Tahmini Net Kar</span>
          <span id="secilen-kar" class="text-green" style="font-weight:600"></span>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="satisEkle()">
        ✓ Satışı Kaydet
      </button>
    </div>

    <!-- TOPLU SATIŞ -->
    <div class="card mb-16">
      <div class="card-header">
        <div class="card-title">Toplu Satış</div>
        <button class="btn btn-ghost btn-sm" onclick="topluModalAc()">Düzenle</button>
      </div>
      <div style="font-size:12px;color:var(--t3)">Birden fazla ürünü aynı anda kaydedin</div>
    </div>

    <!-- BUGÜNÜN SATIŞLARI -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Bugünün Satışları</div>
        <span id="bugun-sayi" style="font-size:12px;color:var(--t3)"></span>
      </div>
      <div id="bugun-satis-listesi"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-label">Panel</span>
    </a>
    <a class="nav-item" href="fiyatlar.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span class="nav-label">Fiyatlar</span>
    </a>
    <a class="nav-item active" href="satis-giris.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <span class="nav-label">Satış</span>
    </a>
    <a class="nav-item" href="stok.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <span class="nav-label">Stok</span>
    </a>
    <a class="nav-item" href="ayarlar.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nav-label">Ayarlar</span>
    </a>
  </nav>

</div>

<!-- TOPLU SATIŞ MODAL -->
<div class="modal-overlay" id="toplu-modal" onclick="modalKapat('toplu-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()" style="max-height:95dvh">
    <div class="modal-handle"></div>
    <div class="modal-title">Toplu Satış Girişi</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:16px">Adet 0 olan ürünler kaydedilmez</div>
    <div id="toplu-liste" style="max-height:50dvh;overflow-y:auto"></div>
    <button class="btn btn-primary btn-full mt-16" onclick="topluKaydet()">Tümünü Kaydet</button>
  </div>
</div>

<div class="toast-container" id="toastCont"></div>

<script type="module">
import { auth, urunlerDB, satislarDB, ayarlarDB, hesapla } from './state.js';
if (!auth.oturum()) window.location.href='index.html';

const ayarlar = ayarlarDB.oku();
const bugunStr = new Date().toISOString().slice(0,10);
document.getElementById('satis-tarih').value = bugunStr;
document.getElementById('tarih-goster').textContent =
  new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long'});

function para(n) { return (+n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺'; }

// Ürün dropdown
function urundropdownDoldur() {
  const sel = document.getElementById('satis-urun');
  const urunler = urunlerDB.hepsini();
  sel.innerHTML = '<option value="">— Ürün seçin —</option>' +
    urunler.map(u => `<option value="${u.id}">${u.ad} (Stok: ${u.stok||0})</option>`).join('');
}

// Seçilen ürün özeti güncelle
document.getElementById('satis-urun').addEventListener('change', function() {
  const u = urunlerDB.bul(this.value);
  const ozet = document.getElementById('secilen-ozet');
  if (!u) { ozet.style.display='none'; return; }
  const adet = +document.getElementById('satis-adet').value || 1;
  const f = hesapla.satisFiyati(u, ayarlar, adet);
  document.getElementById('secilen-stok').textContent = `${u.stok||0} adet`;
  document.getElementById('secilen-kar').textContent  = f ? para(f.netKar) : '—';
  ozet.style.display = '';
});

document.getElementById('satis-adet').addEventListener('input', function() {
  const u = urunlerDB.bul(document.getElementById('satis-urun').value);
  if (!u) return;
  const f = hesapla.satisFiyati(u, ayarlar, +this.value||1);
  document.getElementById('secilen-kar').textContent = f ? para(f.netKar) : '—';
});

window.satisEkle = () => {
  const urunId = document.getElementById('satis-urun').value;
  const adet   = +document.getElementById('satis-adet').value;
  const tarih  = document.getElementById('satis-tarih').value;
  if (!urunId) { toast('Ürün seçin','error'); return; }
  if (!adet || adet < 1) { toast('Geçerli adet girin','error'); return; }
  const u = urunlerDB.bul(urunId);
  if ((u.stok||0) < adet) {
    if (!confirm(`Stok yetersiz (${u.stok||0} adet). Yine de kaydet?`)) return;
  }
  satislarDB.ekle([{ urunId, adet, tarih }]);
  renderBugun();
  renderOzet();
  document.getElementById('secilen-ozet').style.display='none';
  document.getElementById('satis-urun').value='';
  document.getElementById('satis-adet').value='1';
  urundropdownDoldur();
  toast(`${u.ad} — ${adet} adet kaydedildi`,'success');
};

window.satisSil = (id) => {
  if (!confirm('Bu satışı silmek ve stoku geri yüklemek ister misiniz?')) return;
  satislarDB.sil(id);
  renderBugun(); renderOzet(); urundropdownDoldur();
  toast('Satış silindi','info');
};

function renderOzet() {
  const satislar = satislarDB.guneBGore(bugunStr);
  let adet=0, kar=0;
  satislar.forEach(s => {
    const u = urunlerDB.bul(s.urunId); if (!u) return;
    adet += s.adet;
    const f = hesapla.satisFiyati(u, ayarlar, s.adet);
    if (f) kar += f.netKar;
  });
  document.getElementById('ozet-adet').textContent = adet;
  document.getElementById('ozet-kar').textContent  = para(kar);
}

function renderBugun() {
  const satislar = [...satislarDB.guneBGore(bugunStr)].reverse();
  document.getElementById('bugun-sayi').textContent = `${satislar.length} kayıt`;
  const el = document.getElementById('bugun-satis-listesi');
  if (!satislar.length) {
    el.innerHTML='<div class="empty-state" style="padding:20px"><div class="empty-icon">🛒</div><div class="empty-title">Henüz satış yok</div></div>';
    return;
  }
  el.innerHTML = satislar.map(s => {
    const u = urunlerDB.bul(s.urunId);
    if (!u) return '';
    const f = hesapla.satisFiyati(u, ayarlar, s.adet);
    return `<div class="urun-row">
      <div class="urun-avatar">🛍️</div>
      <div class="urun-info">
        <div class="urun-ad">${u.ad}</div>
        <div class="urun-meta">${s.adet} adet · ${s.tarih}</div>
      </div>
      <div class="urun-fiyat">
        <div class="urun-fiyat-ana text-green">${f ? '+'+para(f.netKar) : '—'}</div>
        <button onclick="satisSil('${s.id}')" style="font-size:11px;color:var(--t3);background:transparent;margin-top:4px">✕ sil</button>
      </div>
    </div>`;
  }).join('');
}

// Toplu satış
window.topluModalAc = () => {
  const urunler = urunlerDB.hepsini();
  document.getElementById('toplu-liste').innerHTML = urunler.map(u =>
    `<div class="urun-row">
      <div class="urun-info">
        <div class="urun-ad" style="font-size:13px">${u.ad}</div>
        <div class="urun-meta">Stok: ${u.stok||0}</div>
      </div>
      <div style="width:70px">
        <input class="form-input" type="number" min="0" value="0"
          data-uid="${u.id}" style="padding:8px;text-align:center;font-size:14px">
      </div>
    </div>`
  ).join('');
  document.getElementById('toplu-modal').classList.add('open');
};

window.topluKaydet = () => {
  const tarih = bugunStr;
  const inputs = document.querySelectorAll('#toplu-liste input[data-uid]');
  const kayitlar = [];
  inputs.forEach(inp => {
    const adet = +inp.value;
    if (adet > 0) kayitlar.push({ urunId: inp.dataset.uid, adet, tarih });
  });
  if (!kayitlar.length) { toast('Adet girmediniz','error'); return; }
  satislarDB.ekle(kayitlar);
  document.getElementById('toplu-modal').classList.remove('open');
  renderBugun(); renderOzet(); urundropdownDoldur();
  toast(`${kayitlar.length} satış kaydedildi`,'success');
};

window.excelIndir = async () => {
  const { utils, writeFile } = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
  const satislar = satislarDB.hepsini();
  const data = satislar.map(s => {
    const u = urunlerDB.bul(s.urunId);
    const f = u ? hesapla.satisFiyati(u, ayarlar, s.adet) : null;
    return {
      'Tarih': s.tarih,
      'Ürün': u?.ad || 'Silinmiş',
      'Adet': s.adet,
      'Satış Fiyatı (₺)': f ? f.yuvarlak.toFixed(2) : '',
      'Net Kar (₺)': f ? f.netKar.toFixed(2) : '',
    };
  });
  const ws = utils.json_to_sheet(data);
  const wb = utils.book_new(); utils.book_append_sheet(wb, ws, 'Satışlar');
  writeFile(wb, `satislar_${bugunStr}.xlsx`);
  toast('Excel indirildi','success');
};

window.modalKapat = id => document.getElementById(id).classList.remove('open');
window.toast = (msg,tip='info') => {
  const cont=document.getElementById('toastCont');
  const el=document.createElement('div'); el.className=`toast ${tip}`; el.textContent=msg;
  cont.appendChild(el); setTimeout(()=>el.remove(),3000);
};

urundropdownDoldur(); renderBugun(); renderOzet();
</script>
</body>
</html>
