<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Finans · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
<style>
.fin-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.fin-tab{padding:8px 14px;border-radius:var(--r-md);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border2);color:var(--t3);background:var(--bg2);transition:all .15s}
.fin-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(99,102,241,.06)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--t3)}
.upload-sub{font-size:11px;color:var(--t4);margin-top:4px}
.fatura-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.fatura-row:last-child{border:none}
.fatura-ikon{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fatura-ikon.gelen{background:rgba(16,185,129,.12);color:var(--green)}
.fatura-ikon.giden{background:rgba(239,68,68,.12);color:var(--red)}
.fatura-ikon.masraf{background:rgba(245,158,11,.12);color:#f59e0b}
.fatura-bilgi{flex:1;min-width:0}
.fatura-ad{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fatura-meta{font-size:11px;color:var(--t3);margin-top:2px}
.fatura-tutar{text-align:right;flex-shrink:0}
.fatura-tutar-ana{font-size:14px;font-weight:700;font-family:var(--mono)}
.fatura-tutar-kdv{font-size:10px;color:var(--t3)}
.rapor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.rapor-card-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px}
.rapor-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rapor-row:last-child{border:none}
.rapor-lbl{font-size:13px;color:var(--t2)}
.rapor-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.ai-loading{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg3);border-radius:var(--r-md);margin-bottom:12px;font-size:13px;color:var(--accent)}
.ai-loading .spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-inline{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-inline .form-group{flex:1;min-width:120px}
.dilim-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:8px 0}
.dilim-bar div{height:100%}

/* 💎 Premium Trendyol Payout Styles */
.payout-grad-card{background:linear-gradient(135deg, var(--accent), #4f46e5);color:#fff;padding:20px;border-radius:var(--r-xl);margin-bottom:20px;box-shadow:0 8px 25px rgba(99,102,241,0.3);position:relative;overflow:hidden}
.payout-grad-card::before{content:'';position:absolute;top:-20%;right:-10%;width:150px;height:150px;background:rgba(255,255,255,0.1);border-radius:50%}
.payout-grad-val{font-size:32px;font-weight:800;letter-spacing:-1.5px;margin:4px 0}
.payout-grad-lbl{font-size:11px;opacity:0.8;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.payout-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin:20px 0;padding:0 4px}
.payout-bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px;position:relative;transition:all .3s ease;cursor:pointer}
.payout-bar:hover{filter:brightness(1.2);transform:scaleX(1.1)}
.payout-bar::after{content:attr(data-val);position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--t1);font-weight:700;opacity:0;transition:opacity .2s}
.payout-bar:hover::after{opacity:1}
.payout-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;transition:all .2s;position:relative;overflow:hidden}
.payout-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateX(4px)}
.payout-card.past{opacity:0.6;filter:grayscale(0.5)}
.payout-status{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:0.5px}
.payout-status.future{background:rgba(16,185,129,0.15);color:var(--green)}
.payout-status.past{background:var(--bg3);color:var(--t3)}

/* Alt sekmeler */
.sub-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);border-radius:var(--r-md);padding:4px}
.sub-tab{flex:1;padding:7px 6px;text-align:center;font-size:11px;font-weight:700;border-radius:var(--r-sm);cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .15s}
.sub-tab.active{background:var(--bg3);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,0.18)}
/* Fatura önizleme satırı */
.onizleme-row{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:10px;margin-bottom:8px}
.onizleme-row input{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 10px;font-size:12px;color:var(--t1);width:100%}
/* Alt tip badge */
.altbadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px;margin-left:4px}
.altbadge.trendyol{background:rgba(99,102,241,.15);color:var(--accent)}
.altbadge.masraf{background:rgba(245,158,11,.15);color:#f59e0b}
.altbadge.malzeme{background:rgba(16,185,129,.15);color:var(--green)}
.altbadge.giden{background:rgba(239,68,68,.12);color:var(--red)}
</style>
</head>

<script type="module">
import { auth, faturalarDB, ayarlarDB, satislarDB, listingDB, hesapla, sbStorageUpload } from './state.js';
if(!auth.oturum()?.token) window.location.href='./index.html';
if(auth.rol()==='ortak') document.body.classList.add('role-ortak');

const ayarlar = ayarlarDB.oku();
const p = n => (+n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';

window.sekme = s => {
  ['gelen','giden','rapor','trendyol'].forEach(id => {
    const el = document.getElementById('pnl-'+id);
    if(el) el.style.display = s===id ? '' : 'none';
  });
  document.querySelectorAll('.fin-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(s.substring(0,3))));
  if(s==='rapor') renderRapor();
  if(s==='trendyol' && !document.getElementById('ty-odeme-liste')?.dataset.yuklendi) tyOdemeleriCek();
  if(s==='gelen') { renderListe('gelen'); gelenAlt('tumu'); }
  if(s==='giden') renderListe('giden');
};

// ── DAYANIKLI PROXY ÇAĞRISI (RETRY LOGIC) ──
async function proxyCall(payload, deneme = 1) {
  const PROXY = 'https://zburwdqwpoxpocymkutk.supabase.co/functions/v1/bright-api';
  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      if (res.status === 503 || res.status === 500 || res.status === 429) throw new Error(`Sunucu Hatası (${res.status})`);
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `Hata (${res.status})`);
    }
    return await res.json();
  } catch (err) {
    if (deneme < 3) {
      console.warn(`Bağlantı hatası, tekrar deneniyor... Deneme: ${deneme}`, err.message);
      await new Promise(r => setTimeout(r, 3000));
      return proxyCall(payload, deneme + 1);
    }
    throw err;
  }
}

// ── TRENDYOL ÖDEMELERİ — V50 ──
async function tyOdemeleriCek() {
  const ay = ayarlarDB.oku();
  const listEl = document.getElementById('ty-odeme-liste');
  const chartEl = document.getElementById('ty-payout-chart');
  listEl.innerHTML = '<div class="ai-loading"><div class="spinner"></div><span>Finansal veriler taranıyor...</span></div>';

  try {
    const startMs = new Date(new Date().getFullYear(), 0, 1).getTime();
    const endMs = Date.now() + 35 * 86400000;
    const CHUNK_SIZE = 14 * 86400000;

    const araliklar = [];
    for(let t = startMs; t < endMs; t += CHUNK_SIZE)
      araliklar.push({ s: t, e: Math.min(t + CHUNK_SIZE - 1, endMs) });

    let tumContent = [];
    for(let i = 0; i < araliklar.length; i++) {
      listEl.innerHTML = `<div class="ai-loading"><div class="spinner"></div><span>Veriler Çekiliyor %${Math.round(((i+1)/araliklar.length)*100)}</span></div>`;
      const setRes = await proxyCall({
        sellerId: ay.tySellerId, apiKey: ay.tyApiKey, apiSecret: ay.tyApiSecret,
        type: 'settlements', size: 500, startDate: araliklar[i].s, endDate: araliklar[i].e
      });
      if(setRes.content) tumContent = tumContent.concat(setRes.content);
      if(i < araliklar.length - 1) await new Promise(r => setTimeout(r, 600));
    }

    if(!tumContent.length) {
      listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t4)">Ödeme kaydı bulunamadı.</div>';
      return;
    }

    const gruplar = {};
    const processedIds = new Set();
    const bugunMs = new Date().setHours(0,0,0,0);

    tumContent.forEach(it => {
      const uniqueId = String(it.id||it.transactionId||'') + '_' + String(it.transactionDate||'') + '_' + String(it.credit||0);
      if(processedIds.has(uniqueId)) return;
      processedIds.add(uniqueId);

      const pMs = it.paymentDate || it.transactionDate;
      if(!pMs) return;

      const sellerRev  = it.sellerRevenue ?? 0;
      const credit     = it.credit || 0;
      const commission = it.commissionAmount || 0; // işaret korunuyor: satışta negatif, iadede pozitif

      let dKey, realMs, gunLabel, isFuture;

      if(it.paymentOrderId != null) {
        // paymentOrderId dolu = TY ödeme emri oluşturmuş = ÖDENDİ
        dKey = 'paid_' + it.paymentOrderId;
        const d = new Date(pMs); d.setHours(0,0,0,0);
        realMs   = d.getTime();
        gunLabel = d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
        isFuture = false;
      } else {
        // paymentOrderId null = beklemede — tüm bekleyenleri tek grupta topla
        dKey     = 'pend_all';
        realMs   = bugunMs;
        gunLabel = 'Beklemede';
        isFuture = true;
      }

      if(!gruplar[dKey])
        gruplar[dKey] = { toplam:0, satis:0, komisyon:0, items:[], ms:realMs, gun:gunLabel, isFuture, pkgCredits:{} };

      gruplar[dKey].satis     += credit;
      gruplar[dKey].komisyon  += commission;
      gruplar[dKey].toplam    += sellerRev;
      gruplar[dKey].items.push(it);

      if(credit > 0 && it.shipmentPackageId) {
        const pkg = String(it.shipmentPackageId);
        gruplar[dKey].pkgCredits[pkg] = (gruplar[dKey].pkgCredits[pkg] || 0) + credit;
      }
    });

    // Kargo tahmini — sadece bekleyen (paymentOrderId null) gruplar
    Object.values(gruplar).forEach(g => {
      if(!g.isFuture) return;
      const pkgList = Object.values(g.pkgCredits);
      g.estimatedKargo = pkgList.length
        ? pkgList.reduce((s, p) => s + hesapla.gercekKargoBedeli(p, 1, ay), 0)
        : 0;
      g.estimatedNet = Math.max(0, g.toplam - g.estimatedKargo);
    });

    // Özet sayılar
    let gelecekToplam = 0, yakinToplam = 0, yillikOdenen = 0;
    const yediGun = 7 * 86400000;
    Object.values(gruplar).forEach(g => {
      const net = g.isFuture ? g.estimatedNet : g.toplam;
      if(g.isFuture) { gelecekToplam += net; if(g.ms < bugunMs + yediGun) yakinToplam += net; }
      else yillikOdenen += net;
    });

    const sortedDates = Object.keys(gruplar).sort((a,b) => gruplar[a].ms - gruplar[b].ms);
    const maxVal = Math.max(...Object.values(gruplar).map(g => g.isFuture ? g.estimatedNet : g.toplam), 1);

    // Grafik — son 30 gün ödendi + tüm bekleyen
    const chartKeys = sortedDates.filter(k => gruplar[k].ms >= bugunMs - 30 * 86400000);
    chartEl.innerHTML = chartKeys.map(k => {
      const g = gruplar[k];
      const val = g.isFuture ? g.estimatedNet : g.toplam;
      const h   = (val / maxVal) * 100;
      const lbl = g.gun.split('/').slice(0,2).join('/');
      return `<div class="payout-bar" style="height:${Math.max(h,12)}%;background:${g.isFuture?'var(--accent)':'rgba(255,255,255,0.15)'}">
        <span style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t4);font-weight:600">${lbl}</span>
      </div>`;
    }).join('');

    // Liste — son 30 gün ödendi + tüm bekleyen
    const listKeys = sortedDates.filter(k => gruplar[k].ms >= bugunMs - 30 * 86400000);

// ── CLAUDE AI FATURA OKUMA ───────────────────────────────────────
const MAX_AI_BOYUT = 5 * 1024 * 1024; // 5 MB

async function claudeOku(base64Data, mimeType, tip = 'gelen') {
  const apiKey = ayarlarDB.oku().claudeApiKey;
  if (!apiKey) throw new Error('API_KEY_YOK');

  const isGiden = tip === 'giden';
  const prompt = isGiden
    ? `Görev: GİDEN SATIŞ FATURASI okumak. MÜŞTERİYİ bul.
DÖNÜŞ ŞABLONU (Sadece JSON):
{"tarih":"YYYY-MM-DD","fatura_no":"","tutar":0.00,"kdv_tutari":0.00,"kdv_orani":20,"cari_adi":"","aciklama":""}
KURALLAR: 1) "SAYIN" veya "Müşteri" yazan alanın altındaki isim cari_adi olacak. 2) tutar = KDV hariç toplam.`
    : `Görev: ALIŞ / MASRAF FATURASI okumak. SATICI FİRMAYI bul.
DÖNÜŞ ŞABLONU (Sadece JSON):
{"tarih":"YYYY-MM-DD","fatura_no":"","tutar":0.00,"kdv_tutari":0.00,"kdv_orani":20,"cari_adi":"","aciklama":""}
KURALLAR: 1) Faturayı düzenleyen (bize satan) firmayı bul — genellikle sayfanın sol üstünde büyük harflerle. 2) tutar = KDV hariç toplam.`;

  const content = mimeType === 'application/pdf'
    ? [{ type:'document', source:{type:'base64', media_type:'application/pdf', data:base64Data} }, { type:'text', text:prompt }]
    : [{ type:'text', text: prompt + '\n\nFatura Metni:\n' + atob(base64Data).substring(0,15000) }];

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1024, messages:[{role:'user', content}] })
  });

  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  const text = data.content?.[0]?.text || '';
  const jsonMatch = text.match(/\{[\s\S]*?\}/);
  if (!jsonMatch) throw new Error('JSON çıkarılamadı');
  return JSON.parse(jsonMatch[0]);
}

async function dosyaAiIsle(f, bekleyenArr, renderFn, tip) {
  const apiKey = ayarlarDB.oku().claudeApiKey;
  const idx = bekleyenArr.findIndex(b => b.file === f);
  if (idx === -1) return;

  if (!apiKey) {
    bekleyenArr[idx].aiDurum = 'no_key';
    renderFn(); return;
  }
  if (f.size > MAX_AI_BOYUT) {
    bekleyenArr[idx].aiDurum = 'buyuk';
    renderFn(); return;
  }

  bekleyenArr[idx].aiDurum = 'bekliyor';
  renderFn();

  try {
    const base64 = await new Promise(res => { const rd=new FileReader(); rd.onload=e=>res(e.target.result.split(',')[1]); rd.readAsDataURL(f); });
    const mime = f.type || (f.name.endsWith('.pdf') ? 'application/pdf' : 'text/html');
    const sonuc = await claudeOku(base64, mime, tip);
    if (sonuc) {
      if (sonuc.tarih)    bekleyenArr[idx].tarih    = sonuc.tarih;
      if (sonuc.tutar)    bekleyenArr[idx].tutar    = sonuc.tutar;
      if (sonuc.cari_adi) bekleyenArr[idx].aciklama = sonuc.cari_adi;
      bekleyenArr[idx].aiDurum = 'ok';
    } else {
      bekleyenArr[idx].aiDurum = 'hata';
    }
  } catch(e) {
    bekleyenArr[idx].aiDurum = 'hata';
    bekleyenArr[idx].aiHataMesaj = e.message === 'API_KEY_YOK' ? 'API key eksik' : e.message?.substring(0,60);
    console.warn('AI okuma hatası:', f.name, e.message);
  }
  renderFn();
}

function aiDurumBadge(b) {
  if (!b.aiDurum || b.aiDurum === 'bekliyor')
    return '<span style="font-size:10px;color:var(--t4)">⏳ AI okuyor…</span>';
  if (b.aiDurum === 'ok')
    return '<span style="font-size:10px;color:var(--green)">✓ AI okudu</span>';
  if (b.aiDurum === 'buyuk')
    return '<span style="font-size:10px;color:var(--yellow)" title="5MB üstü dosyalarda AI kullanılamıyor">⚠ Dosya çok büyük — manuel gir</span>';
  if (b.aiDurum === 'no_key')
    return '<span style="font-size:10px;color:var(--yellow)">⚠ API key eksik</span>';
  return `<span style="font-size:10px;color:var(--red)" title="${b.aiHataMesaj||''}">⚠ AI okuyamadı — manuel gir</span>`;
}

window.renderRapor = () => {
  const ay = ayarlarDB.oku();
  const ozetEl = document.getElementById('rapor-ozet');
  if(!ozetEl) return;

  // Dönem başlangıç tarihleri (YYYY-MM-DD)
  const bugun = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  const pazartesi = new Date(bugun);
  pazartesi.setDate(bugun.getDate() - (bugun.getDay() === 0 ? 6 : bugun.getDay() - 1));
  const ARALIKLAR = {
    gunluk:   { b: fmt(bugun),                        e: fmt(bugun),  label: 'Günlük'  },
    haftalik: { b: fmt(pazartesi),                    e: fmt(bugun),  label: 'Haftalık' },
    aylik:    { b: fmt(bugun).slice(0,7) + '-01',     e: fmt(bugun),  label: 'Aylık'   },
    yillik:   { b: fmt(bugun).slice(0,4) + '-01-01',  e: fmt(bugun),  label: 'Yıllık'  },
    tumu:     { b: '2000-01-01',                      e: '9999-12-31', label: 'Tümü'   },
  };

  function satisOzetle(liste) {
    let ciro=0, alis=0, kom=0, kargo=0, platform=0, adet=0;
    liste.forEach(s => {
      const fiyat  = s.gercekFiyat || 0;
      const qty    = s.adet || 1;
      const tutar  = fiyat * qty;
      ciro   += tutar;
      adet   += qty;
      alis   += s.alisMaliyeti || 0;

      // Komisyon — gerçek varsa kullan, yoksa listing oranı
      if(s.tyKomisyon != null) {
        kom += s.tyKomisyon;
      } else {
        const l = s.tip === 'listing' ? listingDB.bul(s.hedefId) : null;
        kom += tutar * (l?.komisyon || 0.04);
      }

      // Kargo — gerçek varsa kullan, yoksa barem
      if(s.tyKargo != null) {
        kargo += s.tyKargo;
      } else {
        const l = s.tip === 'listing' ? listingDB.bul(s.hedefId) : null;
        kargo += hesapla.gercekKargoBedeli(fiyat, l?.desi || 1, ay);
      }

      // Platform ücreti (sipariş başına bir kez)
      const l = s.tip === 'listing' ? listingDB.bul(s.hedefId) : null;
      const agk = l?.ayniGunKargo ?? ay.ayniGunKargo ?? false;
      platform += agk ? (ay.platformAyniGun || 8.388) : (ay.platformNormal || 13.188);
    });
    const net = ciro - alis - kom - kargo - platform;
    return { ciro, alis, kom, kargo, platform, net, adet, sayi: liste.length };
  }

  function faturaToplam(liste) {
    // gelen/Trendyol: TY'den alınan ödemeler (gelir)
    const gelenToplam = liste.filter(f =>
      (f.tip==='gelen' && (!f.altTip || f.altTip==='trendyol'))
    ).reduce((s,f)=>s+(f.tutar||0), 0);
    // masraf: gelen/masraf + gelen/malzeme + eski tip:'masraf' (gider)
    const masrafToplam = liste.filter(f =>
      f.tip==='masraf' || (f.tip==='gelen' && (f.altTip==='masraf' || f.altTip==='malzeme'))
    ).reduce((s,f)=>s+(f.tutar||0), 0);
    const gidenToplam = liste.filter(f=>f.tip==='giden').reduce((s,f)=>s+(f.tutar||0), 0);
    return { gelen: gelenToplam, giden: gidenToplam, masraf: masrafToplam };
  }

  function renderDonem(periyer) {
    localStorage.setItem('rapor_periyer', periyer);
    const { b, e, label } = ARALIKLAR[periyer];
    const s = satisOzetle(satislarDB.aralik(b, e));
    const f = faturaToplam(faturalarDB.aralik(b, e));
    const genelNet = s.net + f.gelen - f.giden - f.masraf;
    const kr = v => v >= 0 ? 'var(--green)' : 'var(--red)';
    const satir = (lbl, val, renk='') =>
      `<div class="rapor-row"><span class="rapor-lbl">${lbl}</span><span class="rapor-val"${renk?` style="color:${renk}"`:''}>${val}</span></div>`;

    ozetEl.innerHTML = `
      <div class="rapor-card-title">📊 Tahmini Kar/Zarar — ${label}</div>
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        ${Object.entries(ARALIKLAR).map(([k,v])=>`<button onclick="window._rRapor('${k}')" style="padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:${k===periyer?'var(--accent)':'var(--bg3)'};color:${k===periyer?'#fff':'var(--t2)'};font-size:12px;font-weight:600;cursor:pointer">${v.label}</button>`).join('')}
      </div>
      ${satir('Satış Adedi', `${s.sayi} sipariş / ${s.adet} adet`)}
      ${satir('Ciro', p(s.ciro))}
      ${satir('Alış Maliyeti', '-' + p(s.alis), 'var(--red)')}
      ${satir('Komisyon' + (s.sayi&&!satislarDB.aralik(b,e).some(x=>x.tyKomisyon!=null)?' (tahmini)':''), '-' + p(s.kom), 'var(--red)')}
      ${satir('Kargo' + (s.sayi&&!satislarDB.aralik(b,e).some(x=>x.tyKargo!=null)?' (barem tahmini)':''), '-' + p(s.kargo), 'var(--red)')}
      ${satir('Platform Ücreti', '-' + p(s.platform), 'var(--red)')}
      <div class="rapor-row" style="border-top:2px solid var(--border);margin-top:2px">
        <span class="rapor-lbl" style="font-weight:700">Satış Net</span>
        <span class="rapor-val" style="color:${kr(s.net)};font-size:16px">${p(s.net)}</span>
      </div>
      ${f.gelen+f.giden+f.masraf > 0 ? `
        <div style="margin-top:10px;font-size:11px;font-weight:800;color:var(--t4);letter-spacing:0.5px">FATURALAR</div>
        ${f.gelen  > 0 ? satir('Gelen', '+' + p(f.gelen), 'var(--green)') : ''}
        ${f.giden  > 0 ? satir('Giden', '-' + p(f.giden), 'var(--red)') : ''}
        ${f.masraf > 0 ? satir('Masraf', '-' + p(f.masraf), 'var(--red)') : ''}
      ` : ''}
      <div style="margin-top:8px;padding:12px;background:${genelNet>=0?'rgba(16,185,129,0.08)':'rgba(239,68,68,0.08)'};border-radius:var(--r-md);border:1px solid ${genelNet>=0?'var(--green)':'var(--red)'}">
        <div style="font-size:11px;color:var(--t4);font-weight:800;margin-bottom:4px">GENEL TAHMİNİ KAR/ZARAR</div>
        <div style="font-size:24px;font-weight:900;color:${kr(genelNet)}">${p(genelNet)}</div>
        ${s.sayi > 0 ? `<div style="font-size:11px;color:var(--t4);margin-top:2px">Ortalama: ${p(genelNet/s.sayi)} / sipariş</div>` : ''}
      </div>
      <div style="font-size:10px;color:var(--t4);margin-top:8px;opacity:0.6">* Kargo barem: &lt;${ay.kargoBaremEsik1||200}₺ → ${(ay.kargoBaremUcret1||51.492).toFixed(2)}₺ | &lt;${ay.kargoBaremEsik2||350}₺ → ${(ay.kargoBaremUcret2||88.488).toFixed(2)}₺ | üstü → ${(100.716).toFixed(2)}₺</div>`;
  }

  window._rRapor = renderDonem;
  renderDonem(localStorage.getItem('rapor_periyer') || 'aylik');
};


sekme('gelen');
</script>
</body>
</html>
