<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dashboard · Satış Yönetim</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="app-shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">📊 Dashboard</div>
    <div id="topbar-senkron" class="badge badge-green" style="font-size:10px;cursor:pointer" onclick="window.location.href='ayarlar.html'">⬤ Yerel</div>
    <div class="topbar-action" onclick="cikisYap()">↩</div>
  </div>

  <div class="page-content">

    <!-- HOŞ GELDİN -->
    <div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:700;color:var(--t1)" id="hosgeldin">Merhaba 👋</div>
      <div style="font-size:13px;color:var(--t3);margin-top:4px" id="tarih-label"></div>
    </div>

    <!-- BUGÜN İSTATİSTİKLERİ -->
    <div class="section-title">Bugün</div>
    <div class="stat-grid mb-16">
      <div class="stat-card">
        <div class="stat-label">Satış Adedi</div>
        <div class="stat-value accent" id="bugun-satis">0</div>
        <div class="stat-sub">ürün</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net Gelir</div>
        <div class="stat-value green" id="bugun-gelir">0₺</div>
        <div class="stat-sub">tahmini</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Toplam Ürün</div>
        <div class="stat-value" id="toplam-urun">0</div>
        <div class="stat-sub">kayıtlı</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Düşük Stok</div>
        <div class="stat-value red" id="dusuk-stok">0</div>
        <div class="stat-sub">ürün uyarısı</div>
      </div>
    </div>

    <!-- STOK UYARILARI -->
    <div id="stok-uyari-wrap"></div>

    <!-- HIZLI İŞLEMLER -->
    <div class="section-title">Hızlı İşlem</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="window.location.href='satis-giris.html'" style="flex-direction:column;gap:8px;padding:16px;height:auto">
        <span style="font-size:28px">🛒</span>
        <span style="font-size:13px">Satış Girişi</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='fiyatlar.html'" style="flex-direction:column;gap:8px;padding:16px;height:auto">
        <span style="font-size:28px">💰</span>
        <span style="font-size:13px">Fiyat Hesapla</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='alis-hesap.html'" style="flex-direction:column;gap:8px;padding:16px;height:auto">
        <span style="font-size:28px">🎯</span>
        <span style="font-size:13px">Max Alış</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='stok.html'" style="flex-direction:column;gap:8px;padding:16px;height:auto">
        <span style="font-size:28px">📦</span>
        <span style="font-size:13px">Stok Durumu</span>
      </button>
    </div>

    <!-- SON SATIŞLAR -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Son Satışlar</div>
        <a href="satis-giris.html" style="font-size:12px;color:var(--accent)">Tümü →</a>
      </div>
      <div id="son-satislar">
        <div class="empty-state" style="padding:24px">
          <div class="empty-icon">🛒</div>
          <div class="empty-title">Henüz satış yok</div>
          <div class="empty-sub">Satış girişi yapın</div>
        </div>
      </div>
    </div>

    <!-- Bu Ay Özet -->
    <div class="card mt-12">
      <div class="card-header">
        <div class="card-title">Bu Ay</div>
        <a href="raporlar.html" style="font-size:12px;color:var(--accent)">Rapor →</a>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)" id="ay-satis">0</div>
          <div style="font-size:10px;color:var(--t3);margin-top:3px">SATIŞ</div>
        </div>
        <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--green)" id="ay-gelir">0₺</div>
          <div style="font-size:10px;color:var(--t3);margin-top:3px">GELİR</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--blue)" id="ay-urun">0</div>
          <div style="font-size:10px;color:var(--t3);margin-top:3px">ÜRÜN ÇEŞİDİ</div>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-label">Panel</span>
    </a>
    <a class="nav-item" href="fiyatlar.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span class="nav-label">Fiyatlar</span>
    </a>
    <a class="nav-item" href="satis-giris.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <span class="nav-label">Satış</span>
    </a>
    <a class="nav-item" href="stok.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <span class="nav-label">Stok</span>
    </a>
    <a class="nav-item" href="ayarlar.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nav-label">Ayarlar</span>
    </a>
  </nav>

</div>

<div class="toast-container" id="toastCont"></div>

<script type="module">
import { auth, urunlerDB, satislarDB, ayarlarDB, hesapla } from 'state.js';

const o = auth.oturum();
if (!o) { window.location.href = 'index.html'; }

// Hoş geldin
document.getElementById('hosgeldin').textContent = `Merhaba ${o.ad} 👋`;
const simdi = new Date();
const gunler = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
document.getElementById('tarih-label').textContent =
  `${gunler[simdi.getDay()]}, ${simdi.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}`;

window.cikisYap = () => { auth.cikis(); window.location.href='index.html'; };

function para(n) { return n.toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0})+'₺'; }

function render() {
  const urunler  = urunlerDB.hepsini();
  const ayarlar  = ayarlarDB.oku();
  const bugunStr = new Date().toISOString().slice(0,10);
  const satislar = satislarDB.guneBGore(bugunStr);

  // Bugün
  let bugunAdet = 0, bugunGelir = 0;
  satislar.forEach(s => {
    const u = urunlerDB.bul(s.urunId);
    if (!u) return;
    bugunAdet += s.adet;
    const fiyat = hesapla.satisFiyati(u, ayarlar, s.adet);
    if (fiyat) bugunGelir += fiyat.netKar;
  });

  document.getElementById('bugun-satis').textContent = bugunAdet;
  document.getElementById('bugun-gelir').textContent = para(bugunGelir);
  document.getElementById('toplam-urun').textContent = urunler.length;

  // Düşük stok (stok < 10)
  const dusuk = urunler.filter(u => (u.stok||0) < 10);
  document.getElementById('dusuk-stok').textContent = dusuk.length;

  // Uyarılar
  const uyariWrap = document.getElementById('stok-uyari-wrap');
  if (dusuk.length) {
    uyariWrap.innerHTML = `<div class="uyari-banner mb-16">
      ⚠️ <span><b>${dusuk.length} ürün</b> kritik stok seviyesinde</span>
    </div>`;
  }

  // Bu ay
  const ayBas = bugunStr.slice(0,7)+'-01';
  const aySatis = satislarDB.aralik(ayBas, bugunStr);
  let ayAdet = 0, ayGelir = 0; const ayUrunler = new Set();
  aySatis.forEach(s => {
    const u = urunlerDB.bul(s.urunId);
    if (!u) return;
    ayAdet += s.adet; ayUrunler.add(s.urunId);
    const fiyat = hesapla.satisFiyati(u, ayarlar);
    if (fiyat) ayGelir += fiyat.netKar * s.adet;
  });
  document.getElementById('ay-satis').textContent = ayAdet;
  document.getElementById('ay-gelir').textContent = para(ayGelir);
  document.getElementById('ay-urun').textContent = ayUrunler.size;

  // Son satışlar
  const sonSatis = [...satislarDB.hepsini()].reverse().slice(0,5);
  const sonEl = document.getElementById('son-satislar');
  if (!sonSatis.length) return;
  sonEl.innerHTML = sonSatis.map(s => {
    const u = urunlerDB.bul(s.urunId);
    if (!u) return '';
    const fiyat = hesapla.satisFiyati(u, ayarlar);
    return `<div class="urun-row">
      <div class="urun-avatar">🛒</div>
      <div class="urun-info">
        <div class="urun-ad">${u.ad}</div>
        <div class="urun-meta">${s.adet} adet · ${s.tarih}</div>
      </div>
      <div class="urun-fiyat">
        <div class="urun-fiyat-ana text-green">+${fiyat ? Math.round(fiyat.netKar)+'₺' : '-'}</div>
        <div class="urun-fiyat-sub">net kar</div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
