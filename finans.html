<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Finans · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
<style>
.fin-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.fin-tab{padding:8px 14px;border-radius:var(--r-md);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border2);color:var(--t3);background:var(--bg2);transition:all .15s}
.fin-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(99,102,241,.06)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--t3)}
.upload-sub{font-size:11px;color:var(--t4);margin-top:4px}
.fatura-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.fatura-row:last-child{border:none}
.fatura-ikon{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fatura-ikon.gelen{background:rgba(16,185,129,.12);color:var(--green)}
.fatura-ikon.giden{background:rgba(239,68,68,.12);color:var(--red)}
.fatura-ikon.masraf{background:rgba(245,158,11,.12);color:#f59e0b}
.fatura-bilgi{flex:1;min-width:0}
.fatura-ad{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fatura-meta{font-size:11px;color:var(--t3);margin-top:2px}
.fatura-tutar{text-align:right;flex-shrink:0}
.fatura-tutar-ana{font-size:14px;font-weight:700;font-family:var(--mono)}
.fatura-tutar-kdv{font-size:10px;color:var(--t3)}
.rapor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.rapor-card-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px}
.rapor-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rapor-row:last-child{border:none}
.rapor-lbl{font-size:13px;color:var(--t2)}
.rapor-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.ai-loading{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg3);border-radius:var(--r-md);margin-bottom:12px;font-size:13px;color:var(--accent)}
.ai-loading .spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-inline{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-inline .form-group{flex:1;min-width:120px}
.dilim-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:8px 0}
.dilim-bar div{height:100%}

/* 💎 Premium Trendyol Payout Styles */
.payout-grad-card{background:linear-gradient(135deg, var(--accent), #4f46e5);color:#fff;padding:20px;border-radius:var(--r-xl);margin-bottom:20px;box-shadow:0 8px 25px rgba(99,102,241,0.3);position:relative;overflow:hidden}
.payout-grad-card::before{content:'';position:absolute;top:-20%;right:-10%;width:150px;height:150px;background:rgba(255,255,255,0.1);border-radius:50%}
.payout-grad-val{font-size:32px;font-weight:800;letter-spacing:-1.5px;margin:4px 0}
.payout-grad-lbl{font-size:11px;opacity:0.8;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.payout-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin:20px 0;padding:0 4px}
.payout-bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px;position:relative;transition:all .3s ease;cursor:pointer}
.payout-bar:hover{filter:brightness(1.2);transform:scaleX(1.1)}
.payout-bar::after{content:attr(data-val);position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--t1);font-weight:700;opacity:0;transition:opacity .2s}
.payout-bar:hover::after{opacity:1}
.payout-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;transition:all .2s;position:relative;overflow:hidden}
.payout-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateX(4px)}
.payout-card.past{opacity:0.6;filter:grayscale(0.5)}
.payout-status{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:0.5px}
.payout-status.future{background:rgba(16,185,129,0.15);color:var(--green)}
.payout-status.past{background:var(--bg3);color:var(--t3)}
</style>
</head>

<script type="module">
import { auth, faturalarDB, ayarlarDB, satislarDB, hesapla, sbStorageUpload } from './state.js';
if(!auth.oturum()?.token) window.location.href='./index.html';

const ayarlar = ayarlarDB.oku();
const p = n => (+n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';

window.sekme = s => {
  ['gelen','giden','masraf','rapor','trendyol'].forEach(id => {
    const el = document.getElementById('pnl-'+id);
    if(el) el.style.display = s===id ? '' : 'none';
  });
  document.querySelectorAll('.fin-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(s.substring(0,3))));
  if(s==='rapor') renderRapor();
  if(s==='trendyol') tyOdemeleriCek();
};

// ── DAYANIKLI PROXY ÇAĞRISI (RETRY LOGIC) ──
async function proxyCall(payload, deneme = 1) {
  const PROXY = 'https://zburwdqwpoxpocymkutk.supabase.co/functions/v1/bright-api';
  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      if (res.status === 503 || res.status === 500 || res.status === 429) throw new Error(`Sunucu Hatası (${res.status})`);
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `Hata (${res.status})`);
    }
    return await res.json();
  } catch (err) {
    if (deneme < 3) {
      console.warn(`Bağlantı hatası, tekrar deneniyor... Deneme: ${deneme}`, err.message);
      await new Promise(r => setTimeout(r, 3000));
      return proxyCall(payload, deneme + 1);
    }
    throw err;
  }
}

// ── TRENDYOL ÖDEMELERİ (FULL DUAL-CHANNEL SYNC - V39) ──
async function tyOdemeleriCek() {
  const ay = ayarlarDB.oku();
  const listEl = document.getElementById('ty-odeme-liste');
  const chartEl = document.getElementById('ty-payout-chart');
  listEl.innerHTML = '<div class="ai-loading"><div class="spinner"></div><span>Finansal veriler (Ödemeler + Kargolar) taranıyor...</span></div>';

  try {
    const startMs = new Date(new Date().getFullYear(), 0, 1).getTime();
    const endMs = Date.now() + 35 * 86400000;
    const CHUNK_SIZE = 14 * 86400000;
    
    const araliklar = [];
    for(let t = startMs; t < endMs; t += CHUNK_SIZE) {
      araliklar.push({ s: t, e: Math.min(t + CHUNK_SIZE - 1, endMs) });
    }

    let tumContent = [];
    for(let i=0; i < araliklar.length; i++) {
      const p = Math.round(((i+1)/araliklar.length)*100);
      listEl.innerHTML = `<div class="ai-loading"><div class="spinner"></div><span>Veriler Çekiliyor %${p}</span></div>`;
      
      // 1. Ödemeleri çek
      const setRes = await proxyCall({
        sellerId: ay.tySellerId, apiKey: ay.tyApiKey, apiSecret: ay.tyApiSecret,
        type: 'settlements', size: 500, startDate: araliklar[i].s, endDate: araliklar[i].e
      });
      if(setRes.content) tumContent = tumContent.concat(setRes.content);

      if(i < araliklar.length - 1) await new Promise(r => setTimeout(r, 600));
    }

    if(!tumContent.length){
      listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t4)">Ödeme kaydı bulunamadı.</div>';
      return;
    }

    const gruplar = {};
    const processedIds = new Set();
    let gelecekToplam = 0, buHaftaToplam = 0, yillikOdenen = 0;
    const bugunMs = new Date().setHours(0,0,0,0);
    const haftaMs = 7 * 86400000;
    const HAFTA_ETIKET = ['Bu Hafta', 'Gelecek Hafta', '2. Hafta', '3. Hafta', '4. Hafta', '5. Hafta', '6. Hafta', '7. Hafta'];

    // DEBUG: paymentOrderId dağılımı
    { const poidStats = {gecmis_poid_var:0, gecmis_poid_yok:0, gelecek_poid_var:0, gelecek_poid_yok:0};
      tumContent.forEach(it => {
        const pMs = it.paymentDate || it.transactionDate; if(!pMs) return;
        const gg = pMs >= bugunMs;
        const pp = it.paymentOrderId != null;
        if(gg && pp) poidStats.gelecek_poid_var++;
        else if(gg && !pp) poidStats.gelecek_poid_yok++;
        else if(!gg && pp) poidStats.gecmis_poid_var++;
        else poidStats.gecmis_poid_yok++;
      });
      console.log('[DEBUG-POID2]', JSON.stringify(poidStats), '— örnek geçmiş paid:', JSON.stringify(tumContent.find(it => (it.paymentDate||it.transactionDate) < bugunMs)));
    }

    tumContent.forEach(it => {
      const uniqueId = (it.id || it.transactionId || '') + '_' + (it.transactionDate || '') + '_' + (it.credit || it.grossAmount || it.totalAmount || 0);
      if(processedIds.has(uniqueId)) return;
      processedIds.add(uniqueId);

      const pMs = it.paymentDate || it.transactionDate;
      if(!pMs) return;

      const rawNet = it.sellerRevenue != null ? it.sellerRevenue
                   : it.totalAmount   != null ? it.totalAmount
                   : (it.credit || 0) - (it.debt || 0);

      let dKey, realMs, gunLabel, isFuture;

      // paymentOrderId null ise TY henüz batch'e atmamış = ödenmemiş
      const isActuallyPaid = it.paymentOrderId != null && pMs < bugunMs;

      if(!isActuallyPaid) {
        // Gelecek/bekleyen: haftalık bucket
        const refMs = pMs >= bugunMs ? pMs : bugunMs;
        const wIdx = Math.floor((refMs - bugunMs) / haftaMs);
        const wStart = new Date(bugunMs + wIdx * haftaMs);
        const wEnd   = new Date(bugunMs + (wIdx + 1) * haftaMs - 1);
        const fmt = d => d.getDate() + '/' + (d.getMonth()+1);
        dKey = `w_${wIdx}`;
        realMs = wStart.getTime();
        gunLabel = (HAFTA_ETIKET[wIdx] || `${wIdx+1}. Hafta`) + ` (${fmt(wStart)}–${fmt(wEnd)})`;
        isFuture = true;
      } else {
        // Gerçekten ödenmiş: per-date (Mon/Thu ayarlaması)
        const d = new Date(pMs);
        const day = d.getDay();
        const np = new Date(d);
        if(day === 1 || day === 4) { /* OK */ }
        else if(day === 0) np.setDate(d.getDate() + 1);
        else if(day === 5 || day === 6) np.setDate(d.getDate() + (day === 5 ? 3 : 2));
        else np.setDate(d.getDate() + (4 - day));
        np.setHours(0,0,0,0);
        dKey = np.toLocaleDateString('tr-TR');
        realMs = np.getTime();
        gunLabel = np.getDate() + '/' + (np.getMonth()+1);
        isFuture = false;
      }

      if(!gruplar[dKey]) {
        gruplar[dKey] = { toplam:0, satis:0, komisyon:0, kargo:0, stopaj:0, items:[], ms:realMs, gun:gunLabel, isFuture, pkgCredits:{} };
      }

      const type = (it.transactionType || it.transactionTypeName || '').toLowerCase();
      const desc = (it.description || '').toLowerCase();

      if(type.includes('komisyon') || type.includes('commission') || desc.includes('komisyon')) {
        gruplar[dKey].komisyon += Math.abs(rawNet);
      } else if(type.includes('kargo') || type.includes('cargo') || desc.includes('kargo') || desc.includes('taşıma')) {
        gruplar[dKey].kargo += Math.abs(rawNet);
      } else if(type.includes('stopaj') || type.includes('withholding') || desc.includes('stopaj')) {
        gruplar[dKey].stopaj += Math.abs(rawNet);
      } else if(rawNet > 0) {
        gruplar[dKey].satis += (it.credit || rawNet);
        if(it.commissionAmount) gruplar[dKey].komisyon += Math.abs(it.commissionAmount);
        if(isFuture && it.shipmentPackageId) {
          const pkg = String(it.shipmentPackageId);
          gruplar[dKey].pkgCredits[pkg] = (gruplar[dKey].pkgCredits[pkg] || 0) + (it.credit || 0);
        }
      }

      gruplar[dKey].toplam += rawNet;
      gruplar[dKey].items.push(it);

      if(isFuture) {
        gelecekToplam += rawNet;
        if(realMs < bugunMs + haftaMs) buHaftaToplam += rawNet;
      } else {
        yillikOdenen += rawNet;
      }
    });

    // Gelecek haftalık gruplar için kargo tahmini
    Object.values(gruplar).forEach(g => {
      if(g.isFuture && Object.keys(g.pkgCredits).length) {
        g.estimatedKargo = Object.values(g.pkgCredits).reduce((s, p) => s + hesapla.gercekKargoBedeli(p, 1, ay), 0);
        g.estimatedNet = Math.max(0, g.toplam - g.estimatedKargo);
      }
    });

    gelecekToplam = Object.values(gruplar).filter(g=>g.isFuture).reduce((s,g)=>s+(g.estimatedNet??g.toplam),0);
    buHaftaToplam = Object.values(gruplar).filter(g=>g.isFuture&&g.ms<bugunMs+haftaMs).reduce((s,g)=>s+(g.estimatedNet??g.toplam),0);

    const sortedDates = Object.keys(gruplar).sort((a,b) => gruplar[a].ms - gruplar[b].ms);
    const maxVal = Math.max(...Object.values(gruplar).map(g => g.estimatedNet ?? g.toplam), 1);

    // Grafik — geçmiş 14 gün per-date + gelecek haftalar
    const chartKeys = sortedDates.filter(k => gruplar[k].ms >= bugunMs - 14 * 86400000);
    chartEl.innerHTML = chartKeys.map(k => {
      const g = gruplar[k];
      const val = g.estimatedNet ?? g.toplam;
      const h = (val / maxVal) * 100;
      const isPast = !g.isFuture;
      const shortLabel = isPast ? g.gun : (HAFTA_ETIKET[parseInt(k.replace('w_',''))]||k).replace(' Hafta','H').replace('Bu ','Bu').replace('Gelecek ','GH');
      return `<div class="payout-bar" style="height:${Math.max(h,12)}%;background:${isPast?'rgba(255,255,255,0.15)':'var(--accent)'}">
        <span style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t4);font-weight:600">${shortLabel}</span>
      </div>`;
    }).join('');

    // Liste render
    listEl.innerHTML = '<div style="font-size:9px;text-align:right;opacity:0.3;margin-bottom:5px">Sistem Versiyonu: V45</div>' +
      sortedDates.filter(k => gruplar[k].ms >= bugunMs - 10 * 86400000).map(k => {
        const g = gruplar[k];
        const isPast = !g.isFuture;
        const displayAmt = (g.estimatedNet ?? g.toplam);
        const isNext = g.isFuture && g.ms < bugunMs + haftaMs;
        return `
          <div class="payout-card ${isPast?'past':''}" style="${isNext?'border:2px solid var(--green);background:rgba(16,185,129,0.06)':''}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div>
                <div style="font-size:10px;color:var(--t4);font-weight:800">${isPast?'BANKA ÖDEME GÜNÜ':'TAHMİNİ ÖDEME DÖNEMİ'}</div>
                <div style="font-size:17px;font-weight:800">${g.gun}</div>
                <div class="payout-status ${isPast?'past':'future'}">${isPast?'✅ ÖDENDİ':'🕒 TAHMİNİ'}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:24px;font-weight:900;color:${isPast?'var(--t2)':'var(--green)'}">${displayAmt.toLocaleString('tr-TR')}₺</div>
                <div style="font-size:10px;color:var(--t4)">${Object.keys(g.pkgCredits||{}).length||g.items.length} Paket</div>
              </div>
            </div>
            <div style="background:var(--bg);border-radius:var(--r-md);padding:10px;font-size:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between"><span style="color:var(--t4)">Brüt Satış:</span><span style="font-weight:700">${g.satis.toLocaleString('tr-TR')}₺</span></div>
              <div style="display:flex;justify-content:space-between"><span style="color:var(--t4)">Komisyon:</span><span style="font-weight:700;color:var(--red)">-${g.komisyon.toLocaleString('tr-TR')}₺</span></div>
              <div style="display:flex;justify-content:space-between"><span style="color:var(--t4)">${isPast?'Kargo/Kesinti':'Tahmini Kargo'}:</span><span style="font-weight:700;color:var(--red)">-${(isPast?g.kargo:(g.estimatedKargo||0)).toLocaleString('tr-TR')}₺</span></div>
              <div style="display:flex;justify-content:space-between"><span style="color:var(--t4)">Stopaj:</span><span style="font-weight:700;color:var(--red)">-${g.stopaj.toLocaleString('tr-TR')}₺</span></div>
            </div>
          </div>`;
      }).join('');

    document.getElementById('ty-ozet-toplam').textContent = gelecekToplam.toLocaleString('tr-TR') + '₺';
    document.getElementById('ty-ozet-yakin').textContent = buHaftaToplam.toLocaleString('tr-TR') + '₺';
    document.getElementById('ty-ozet-odenen').textContent = yillikOdenen.toLocaleString('tr-TR') + '₺';

  } catch (err) {
    listEl.innerHTML = `<div style="color:var(--red); font-size:12px; text-align:center; padding:20px">⚠️ Takvim Hatası: ${err.message}</div>`;
  }
}

window.tyOdemeleriCek = tyOdemeleriCek;
window.toast = (msg, tip='info') => {
  const c = document.getElementById('toastCont');
  const el = document.createElement('div'); el.className = 'toast ' + tip; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
};

// Basitleştirilmiş diğer fonksiyonlar
window.renderListe = (tip) => { /* Liste render kodu */ };
window.renderRapor = () => { /* Rapor render kodu */ };
window.faturaKaydet = (tip) => { /* Kaydetme kodu */ };
window.dosyaIsle = (files, tip) => { /* AI dosya işleme */ };

sekme('trendyol');
