<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Katalog · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
<style>
body.role-ortak .admin-only { display:none !important; }
body.role-ortak button:not(.view-ok) { display:none !important; }
body.role-ortak input, body.role-ortak select { pointer-events:none;opacity:.7;background:var(--bg0,#0a0e1a);border-color:transparent }
.uk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;transition:border-color .2s}
.uk.bagli{border-color:var(--green)}
.uk-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.uk-ikon{width:38px;height:38px;background:var(--bg3);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.uk-bilgi{flex:1;min-width:0}
.uk-ad{font-size:14px;font-weight:600;color:var(--t1);line-height:1.4}
.uk-meta{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.5}
.uk-prices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.uk-price{background:var(--bg3);border-radius:var(--r-md);padding:8px 10px}
.uk-plbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.uk-pval{font-size:15px;font-weight:700;font-family:var(--mono);margin-top:2px}
.uk-karbadge{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--r-md);font-size:12px;font-weight:600;margin-bottom:8px;border:1px solid}
.uk-karbadge.kar{background:var(--green-l,rgba(0,200,100,.08));color:var(--green);border-color:var(--green)}
.uk-karbadge.zarar{background:var(--red-l,rgba(255,60,60,.08));color:var(--red);border-color:var(--red)}
.uk-karbadge.eksik{background:var(--bg3);color:var(--t3);border-color:var(--border2)}
.uk-actions{display:flex;gap:6px}
.uk-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:8px 12px;font-size:13px;color:var(--t1);font-family:var(--font)}
.uk-inp:focus{border-color:var(--accent);outline:none}
.ic-row{display:flex;gap:8px;align-items:center;background:var(--bg3);border-radius:var(--r-md);padding:8px 10px;margin-bottom:6px}
.sd-wrap{position:relative;margin-bottom:12px}
.sd-btn{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:11px 14px;font-size:14px;color:var(--t1);text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:var(--font)}
.sd-panel{position:absolute;top:calc(100%+4px);left:0;right:0;z-index:400;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);box-shadow:var(--shadow-md);display:none}
.sd-panel.open{display:block}
.sd-search{padding:8px;border-bottom:1px solid var(--border)}
.sd-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;color:var(--t1);font-family:var(--font)}
.sd-list{max-height:200px;overflow-y:auto}
.sd-item{padding:10px 14px;font-size:13px;color:var(--t1);cursor:pointer;border-bottom:1px solid var(--border)}
.sd-item:hover{background:var(--bg3)}
.sd-item:last-child{border:none}
.sd-item .si-sub{font-size:11px;color:var(--t3);margin-top:2px}
.sd-none{padding:12px;text-align:center;font-size:12px;color:var(--t3)}
.sync-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:8px 14px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer}
.sync-btn:active{opacity:.7}
.filtre-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.filtre-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;white-space:nowrap}
.filtre-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">🛍️ Katalog</div>
    <button class="sync-btn" id="sync-btn" onclick="manuelSync()" style="margin-left:auto;margin-right:0">🔄 Sync</button>
  </div>
  <div class="page-content">

    <!-- BİLGİ BANNER -->
    <div id="sync-banner" style="display:none;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--r-md);padding:12px;margin-bottom:16px">
      <div id="sync-banner-mesaj" style="font-size:13px;font-weight:600;color:var(--accent)"></div>
      <div id="sync-banner-liste" style="margin-top:6px;font-size:11px;color:var(--t3);line-height:1.9"></div>
    </div>

    <!-- FİLTRE -->
    <div class="filtre-row">
      <button class="filtre-btn active" id="f-hepsi"  onclick="filtreSec('hepsi')">Tümü</button>
      <button class="filtre-btn"        id="f-bagli"  onclick="filtreSec('bagli')">Alış Bağlı</button>
      <button class="filtre-btn"        id="f-eksik"  onclick="filtreSec('eksik')">Alış Eksik</button>
    </div>

    <div id="kart-listesi"></div>
    <div id="kart-bos" style="display:none;text-align:center;padding:40px 0;color:var(--t3)">
      <div style="font-size:32px;margin-bottom:12px">🛍️</div>
      <div id="kart-bos-mesaj" style="font-size:14px;font-weight:600">Katalog boş</div>
      <div id="kart-bos-alt" style="font-size:12px;margin-top:6px">Sync butonuna basarak Trendyol ürünlerini çekin</div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Panel</span></a>
    <a class="nav-item active" href="./fiyatlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="nav-label">Katalog</span></a>
    <a class="nav-item" href="./satis-giris.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg><span class="nav-label">Satış</span></a>
    <a class="nav-item" href="./stok.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><span class="nav-label">Stok</span></a>
    <a class="nav-item" href="./alis-hesap.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span class="nav-label">Max Alış</span></a>
    <a class="nav-item" href="./finans.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finans</span></a>
    <a class="nav-item" href="./rapor.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Rapor</span></a>
    <a class="nav-item" href="./ayarlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nav-label">Ayarlar</span></a>
  </nav>
</div>

<!-- BİLEŞEN BAĞLA MODAL -->
<div class="modal-overlay" id="bl-modal">
  <div class="modal-box">
    <div class="modal-title">Stok Bağla — <span id="bl-urun-adi"></span></div>
    <div class="sd-wrap">
      <button class="sd-btn" id="bl-sd-btn" onclick="blSdToggle()">Stok kalemi seç <span>▾</span></button>
      <div class="sd-panel" id="bl-sd-panel">
        <div class="sd-search"><input id="bl-sd-input" placeholder="Ara..." oninput="blSdFiltrele()"></div>
        <div class="sd-list" id="bl-sd-list"></div>
      </div>
    </div>
    <div id="bl-secilen-list"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('bl-modal').classList.remove('open')">İptal</button>
      <button class="btn btn-primary" style="flex:1" onclick="blKaydet()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastCont"></div>

<script type="module">
import { auth, stokDB, listingDB, setlerDB, ayarlarDB, hesapla, otomatikFiyatSync } from './state.js';
import { kargoUcreti } from './kargo.js';

const o = auth.oturum();
if(!o) window.location.href='index.html';
if(auth.rol()==='ortak') document.body.classList.add('role-ortak');

let ay = ayarlarDB.oku();
let aktifFiltre = 'hepsi';
let blHedefId = null, blHedefTip = null, blSecilen = [];

const p = n => (+(n||0)).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';

function showToast(msg, tip='success'){
  const c=document.getElementById('toastCont');
  const d=document.createElement('div');
  d.className='toast '+(tip==='error'?'toast-error':tip==='info'?'toast-info':'toast-success');
  d.textContent=msg;c.appendChild(d);
  setTimeout(()=>d.classList.add('show'),10);
  setTimeout(()=>{d.classList.remove('show');setTimeout(()=>d.remove(),300);},3000);
}

// ─── Render ─────────────────────────────────────────────────────
window.renderKartlar = () => {
  ay = ayarlarDB.oku();
  const el  = document.getElementById('kart-listesi');
  const bos = document.getElementById('kart-bos');

  let liste = listingDB.hepsini();
  if(aktifFiltre==='bagli')  liste = liste.filter(l=>(l.alisFiyati||0)>0);
  if(aktifFiltre==='eksik')  liste = liste.filter(l=>!(l.alisFiyati>0));

  if(!liste.length){
    el.innerHTML=''; bos.style.display='';
    document.getElementById('kart-bos-mesaj').textContent = aktifFiltre==='hepsi' ? 'Katalog boş' : 'Bu filtrede ürün yok';
    document.getElementById('kart-bos-alt').textContent   = aktifFiltre==='hepsi' ? 'Sync butonuna basarak Trendyol ürünlerini çekin' : '';
    return;
  }
  bos.style.display='none';

  el.innerHTML = liste.map(obj=>{
    const alis  = obj.alisFiyati||0;
    const g     = obj.satisFiyatiGercek||0;
    const desi  = obj.desi||1;
    const kFU   = kargoUcreti(ay.kargoFirma||'Aras', desi);
    const bagliMi = alis > 0;

    let karHTML = '';
    if(bagliMi && g){
      const f = hesapla.satisFiyati({alisFiyati:alis,desi,komisyon:obj.komisyon||0.04,hedefKar:obj.hedefKar,ayniGunKargo:obj.ayniGunKargo||false}, ay, 1, kFU);
      if(f){
        const gKargo = hesapla.gercekKargoBedeli(g, desi, ay, kFU);
        const kar    = hesapla.gercekKar(alis, g, obj.komisyon||0.04, f.platform, gKargo);
        karHTML = `<div class="uk-karbadge ${kar.kararli?'kar':'zarar'}">
          <span>${kar.kararli?'✅ Karlı':'❌ Zararlı'}</span>
          <span>${p(kar.net)} · %${Math.round(kar.roi*100)} ROI</span>
        </div>`;
      }
    } else if(!bagliMi){
      karHTML = `<div class="uk-karbadge eksik"><span>⚠️ Alış maliyeti girilmedi</span><span>Stok bağla →</span></div>`;
    }

    const bilesen = (obj.stokBilesenleri||[]).map(b=>{ const u=stokDB.bul(b.urunId); return u?u.ad.split(' ').slice(0,3).join(' ')+'×'+b.adet:'?'; }).join(' · ');

    return `<div class="uk${bagliMi?' bagli':''}">
      <div class="uk-head">
        <div class="uk-ikon">🏷️</div>
        <div class="uk-bilgi">
          <div class="uk-ad">${obj.ad}</div>
          <div class="uk-meta">${obj.tyBarcode?'Barkod: '+obj.tyBarcode:''}${obj.tyMerchantSku?' · SKU: '+obj.tyMerchantSku:''}${bilesen?' · '+bilesen:''}</div>
        </div>
      </div>
      <div class="uk-prices">
        <div class="uk-price">
          <div class="uk-plbl">TY Satış Fiyatı</div>
          <div class="uk-pval" style="color:var(--accent)">${g?p(g):'—'}</div>
        </div>
        <div class="uk-price" onclick="alisAc('${obj.id}')" style="cursor:pointer">
          <div class="uk-plbl">Alış Maliyeti ✏️</div>
          <div class="uk-pval" style="color:${bagliMi?'var(--t1)':'var(--t3)'}">
            <span id="alis-val-${obj.id}">${bagliMi?p(alis):'gir'}</span>
          </div>
        </div>
      </div>
      ${karHTML}
      <div class="uk-actions">
        <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="blAc('${obj.id}','listing')">🔗 Stok Bağla</button>
      </div>
    </div>`;
  }).join('');
};

// ─── Alış fiyatı inline düzenleme ────────────────────────────────
window.alisAc = id => {
  const obj = listingDB.bul(id);
  if(!obj) return;
  const span = document.getElementById('alis-val-'+id);
  if(!span) return;
  const input = document.createElement('input');
  input.type='number'; input.min='0'; input.step='0.01';
  input.value = obj.alisFiyati||'';
  input.style.cssText='width:90px;background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:14px;font-weight:700;color:var(--t1);font-family:var(--mono)';
  span.replaceWith(input);
  input.focus(); input.select();
  const kaydet = () => {
    const yeni = parseFloat(input.value)||0;
    listingDB.guncelle(id, {alisFiyati:yeni});
    renderKartlar();
    showToast('Alış maliyeti güncellendi','success');
  };
  input.onblur = kaydet;
  input.onkeydown = e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){ renderKartlar(); } };
};

// ─── Filtre ──────────────────────────────────────────────────────
window.filtreSec = f => {
  aktifFiltre = f;
  ['hepsi','bagli','eksik'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',x===f));
  renderKartlar();
};

// ─── Manuel Sync ─────────────────────────────────────────────────
window.manuelSync = async () => {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Syncing...'; btn.disabled = true;
  try{
    const sonuc = await otomatikFiyatSync(true);
    if(sonuc?.hata) showToast('TY ürün API hatası: ' + JSON.parse(sonuc.hata)?.[0]?.message || sonuc.hata, 'error');
    else { showBanner(sonuc); renderKartlar(); }
  } catch(e){ showToast('Sync hatası: '+e.message,'error'); }
  finally{ btn.textContent='🔄 Sync'; btn.disabled=false; }
};

function showBanner(sonuc){
  const g = sonuc?.guncellendi||[];
  const y = sonuc?.yeniEklendi||[];
  if(!g.length && !y.length){
    showToast('Katalog güncel, değişiklik yok','info');
    document.getElementById('sync-banner').style.display='none';
    return;
  }
  const parcalar=[];
  if(y.length) parcalar.push(`${y.length} yeni ürün eklendi`);
  if(g.length) parcalar.push(`${g.length} fiyat güncellendi`);
  document.getElementById('sync-banner-mesaj').textContent = parcalar.join(', ');
  document.getElementById('sync-banner-liste').innerHTML = [
    ...y.map(u=>`🆕 ${u.ad} — <b style="color:var(--accent)">${u.fiyat?.toFixed(2)}₺</b>`),
    ...g.map(u=>`🏷️ ${u.ad}: ${u.eskiFiyat?.toFixed(2)||'?'}₺ → <b style="color:var(--accent)">${u.yeniFiyat?.toFixed(2)}₺</b>`),
  ].join('<br>');
  document.getElementById('sync-banner').style.display='block';
}

// ─── Bileşen Bağla ───────────────────────────────────────────────
window.blAc = (id, tip) => {
  blHedefId=id; blHedefTip=tip; blSecilen=[];
  const obj = tip==='set' ? setlerDB.bul(id) : listingDB.bul(id);
  if(!obj) return;
  blSecilen = (obj.stokBilesenleri||obj.icindekiler||[]).map(b=>({...b}));
  document.getElementById('bl-urun-adi').textContent = '"'+obj.ad+'"';
  blSdDoldur(); renderBlSecilen();
  document.getElementById('bl-modal').classList.add('open');
};

function blSdDoldur(q=''){
  const listEl=document.getElementById('bl-sd-list');
  const liste=stokDB.hepsini().filter(u=>!q||u.ad.toLowerCase().includes(q.toLowerCase()));
  if(!liste.length){listEl.innerHTML='<div class="sd-none">Stok kalemi bulunamadı</div>';return;}
  listEl.innerHTML=liste.map(u=>`<div class="sd-item" onclick="blEkle('${u.id}')"><div>${u.ad}</div><div class="si-sub">Stok: ${u.stok||0} adet · ${p(u.alisFiyati||0)} alış</div></div>`).join('');
}
window.blSdToggle=()=>document.getElementById('bl-sd-panel').classList.toggle('open');
window.blSdFiltrele=()=>blSdDoldur(document.getElementById('bl-sd-input').value);

window.blEkle=uid=>{
  const u=stokDB.bul(uid);if(!u)return;
  const mevcut=blSecilen.find(x=>x.urunId===uid);
  if(mevcut) mevcut.adet++; else blSecilen.push({urunId:uid,adet:1});
  document.getElementById('bl-sd-panel').classList.remove('open');
  document.getElementById('bl-sd-input').value='';
  blSdDoldur(); renderBlSecilen();
};

function renderBlSecilen(){
  const el=document.getElementById('bl-secilen-list');
  if(!blSecilen.length){el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px 0">Henüz seçilmedi</div>';return;}
  el.innerHTML=blSecilen.map((b,i)=>{
    const u=stokDB.bul(b.urunId);if(!u)return'';
    return`<div class="ic-row"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.ad}</div><div style="font-size:11px;color:var(--t3)">Stok: ${u.stok||0} · ${p(u.alisFiyati||0)} alış</div></div><button onclick="blAdet(${i},-1)" style="width:28px;height:28px;background:var(--bg4,var(--bg3));border:none;border-radius:6px;color:var(--t1);cursor:pointer;font-size:16px;flex-shrink:0">−</button><span style="font-size:14px;font-weight:700;min-width:24px;text-align:center">${b.adet}</span><button onclick="blAdet(${i},1)" style="width:28px;height:28px;background:var(--bg4,var(--bg3));border:none;border-radius:6px;color:var(--t1);cursor:pointer;font-size:16px;flex-shrink:0">+</button><button onclick="blKaldir(${i})" style="width:28px;height:28px;background:var(--red-l,rgba(255,60,60,.1));border:none;border-radius:6px;color:var(--red);cursor:pointer;flex-shrink:0">✕</button></div>`;
  }).join('');
}
window.blAdet=(i,d)=>{blSecilen[i].adet=Math.max(1,blSecilen[i].adet+d);renderBlSecilen();};
window.blKaldir=i=>{blSecilen.splice(i,1);renderBlSecilen();};
window.blKaydet=()=>{
  if(!blHedefId)return;
  const toplamAlis=blSecilen.reduce((t,b)=>{const u=stokDB.bul(b.urunId);return t+(u?(u.alisFiyati||0)*b.adet:0);},0);
  listingDB.guncelle(blHedefId,{stokBilesenleri:blSecilen, alisFiyati:toplamAlis||undefined});
  document.getElementById('bl-modal').classList.remove('open');
  renderKartlar();
  showToast('Stok bileşenleri kaydedildi','success');
};

// ─── İlk yükleme ─────────────────────────────────────────────────
renderKartlar();

// Otomatik sync (cooldown varsa atlar)
(async()=>{
  const sonuc = await otomatikFiyatSync();
  if(sonuc?.hata){
    showToast('TY ürün API geçici hatalı, katalog yerel veriden yüklendi', 'info');
  } else if(!sonuc?.atlandi){
    showBanner(sonuc);
    renderKartlar();
  }
})();

</script>
