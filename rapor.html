<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Raporlar · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
<style>
.rapor-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r-md);padding:4px;margin-bottom:16px;overflow-x:auto}
.rapor-tab{flex:1;padding:8px 6px;text-align:center;font-size:12px;font-weight:600;border-radius:var(--r-sm);cursor:pointer;border:none;background:transparent;color:var(--t3);white-space:nowrap;transition:all .15s}
.rapor-tab.active{background:var(--accent);color:#fff}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav-btn{width:36px;height:36px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg2);color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-lbl{font-size:14px;font-weight:700;color:var(--t1)}
.ozet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ozet-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px}
.ozet-card .lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.ozet-card .val{font-size:18px;font-weight:700;margin-top:4px;font-family:var(--mono)}
.ozet-card.full{grid-column:1/-1}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px}
.satis-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:8px}
.satis-row .sr-baslik{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.satis-row .sr-ad{font-size:13px;font-weight:600;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.satis-row .sr-net{font-size:14px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.satis-row .sr-meta{font-size:11px;color:var(--t3);margin-bottom:6px}
.satis-row .sr-detay{display:flex;flex-wrap:wrap;gap:8px}
.sr-item{font-size:11px;color:var(--t3)}
.sr-item b{color:var(--t2)}
.gercek-badge{font-size:9px;padding:1px 5px;border-radius:10px;background:rgba(0,200,100,.15);color:var(--green);font-weight:600;margin-left:4px}
.empty-state{text-align:center;color:var(--t3);padding:32px;font-size:13px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">📈 Raporlar</div>
    <div class="topbar-action" onclick="excelIndir()">⬇</div>
  </div>
  <div class="page-content">

    <div class="rapor-tabs">
      <button class="rapor-tab active" onclick="sekme('gunluk',this)">Günlük</button>
      <button class="rapor-tab" onclick="sekme('haftalik',this)">Haftalık</button>
      <button class="rapor-tab" onclick="sekme('aylik',this)">Aylık</button>
      <button class="rapor-tab" onclick="sekme('yillik',this)">Yıllık</button>
      <button class="rapor-tab" onclick="sekme('tumu',this)">Tümü</button>
    </div>

    <!-- GÜNLÜK -->
    <div id="pane-gunluk">
      <div class="nav-row">
        <button class="nav-btn" onclick="navGun(-1)">‹</button>
        <span class="nav-lbl" id="gunluk-lbl"></span>
        <button class="nav-btn" onclick="navGun(+1)">›</button>
      </div>
      <div class="ozet-grid" id="gunluk-ozet"></div>
      <div class="chart-wrap">
        <div class="chart-title">Günlük Satışlar</div>
        <div id="gunluk-liste"></div>
      </div>
    </div>

    <!-- HAFTALIK -->
    <div id="pane-haftalik" style="display:none">
      <div class="nav-row">
        <button class="nav-btn" onclick="navHafta(-1)">‹</button>
        <span class="nav-lbl" id="haftalik-lbl"></span>
        <button class="nav-btn" onclick="navHafta(+1)">›</button>
      </div>
      <div class="ozet-grid" id="haftalik-ozet"></div>
      <div class="chart-wrap">
        <div class="chart-title">Bu Hafta Satışlar</div>
        <div id="haftalik-liste"></div>
      </div>
    </div>

    <!-- AYLIK -->
    <div id="pane-aylik" style="display:none">
      <div class="nav-row">
        <button class="nav-btn" onclick="navAy(-1)">‹</button>
        <span class="nav-lbl" id="aylik-lbl"></span>
        <button class="nav-btn" onclick="navAy(+1)">›</button>
      </div>
      <div class="ozet-grid" id="aylik-ozet"></div>
      <div class="chart-wrap">
        <div class="chart-title" style="margin-bottom:0">Günlük Net Kar</div>
        <div id="aylik-chart"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Bu Ay Satışlar</div>
        <div id="aylik-liste"></div>
      </div>
    </div>

    <!-- YILLIK -->
    <div id="pane-yillik" style="display:none">
      <div class="nav-row">
        <button class="nav-btn" onclick="navYil(-1)">‹</button>
        <span class="nav-lbl" id="yillik-lbl"></span>
        <button class="nav-btn" onclick="navYil(+1)">›</button>
      </div>
      <div class="ozet-grid" id="yillik-ozet"></div>
      <div class="chart-wrap">
        <div class="chart-title" style="margin-bottom:0">Aylık Net Kar</div>
        <div id="yillik-chart"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Bu Yıl Satışlar</div>
        <div id="yillik-liste"></div>
      </div>
    </div>

    <!-- TÜMÜ -->
    <div id="pane-tumu" style="display:none">
      <div class="ozet-grid" id="tumu-ozet"></div>
      <div class="chart-wrap">
        <div class="chart-title">Tüm Satışlar</div>
        <div id="tumu-liste"></div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Panel</span></a>
    <a class="nav-item" href="./fiyatlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="nav-label">Katalog</span></a>
    <a class="nav-item" href="./satis-giris.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg><span class="nav-label">Satış</span></a>
    <a class="nav-item" href="./stok.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><span class="nav-label">Stok</span></a>
    <a class="nav-item" href="./alis-hesap.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span class="nav-label">Max Alış</span></a>
    <a class="nav-item" href="./finans.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finans</span></a>
    <a class="nav-item active" href="./rapor.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Rapor</span></a>

<div class="toast-container" id="toastCont"></div>

<script type="module">
import { auth, stokDB, listingDB, setlerDB, satislarDB } from './state.js';

if(!auth.oturum()?.token) window.location.href='./index.html';

const aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const p = n => (+(n||0)).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';

// ─── satisKar ─────────────────────────────────────────────────────
function satisKar(s){
  let ad='?', gf=+(s.gercekFiyat||0);

  if(s.tip==='stok-combo'){
    ad = (s.stokKombo||[]).map(it=>it.ad).join(' + ')||'Kombo';
  } else if(s.tip==='stok'){
    const u=stokDB.bul(s.hedefId); if(u) ad=u.ad;
  } else if(s.tip==='set'){
    const u=setlerDB.bul(s.hedefId); if(u) ad=u.ad;
  } else {
    const u=listingDB.bul(s.hedefId); if(u) ad=u.ad;
  }

  const alis = (s.alisMaliyeti ?? 0) * s.adet;
  const tySellerRevenue = s.tySellerRevenue ?? null;
  const tyKargo = s.tyKargo ?? null;

  const veriTam = tySellerRevenue != null && tyKargo != null;
  let net = null, roi = null;

  if(veriTam){
    net = tySellerRevenue - tyKargo - alis;
    roi = alis > 0 ? net / alis : 0;
  }

  return {
    net, roi, kararli: net !== null && net >= 0, ad, tip: s.tip, adet: s.adet,
    gelir: gf * s.adet,
    alis,
    tySellerRevenue,
    tyKargo,
    veriTam
  };
}

// ─── Özet hesapla ─────────────────────────────────────────────────
function ozetHesapla(satislar){
  let adet=0,gelir=0,alis=0,net=0, tamSayi=0;
  satislar.forEach(s=>{
    const k=satisKar(s);if(!k)return;
    if(k.veriTam){
      adet+=s.adet; gelir+=k.gelir; alis+=k.alis;
      net+=k.net;
      tamSayi++;
    }
  });
  return {adet,gelir,alis,net,roi:alis>0?net/alis:0, tamSayi, toplamSayi:satislar.length};
}

// ─── Özet kartları ────────────────────────────────────────────────
function renderOzet(ozet, targetId){
  const el=document.getElementById(targetId);
  if(!el)return;
  const netRenk=ozet.net>=0?'var(--green)':'var(--red)';
  const incompleteText = ozet.tamSayi < ozet.toplamSayi ? `<div style="font-size:10px;color:var(--yellow);margin-top:4px">⚠️ ${ozet.toplamSayi - ozet.tamSayi} satışın kargo/mutabakat verisi eksik</div>` : '';

  el.innerHTML=`
    <div class="ozet-card full" style="border-color:${netRenk}">
      <div class="lbl">Net Kar <span style="float:right;font-weight:normal;color:var(--t3)">(${ozet.tamSayi}/${ozet.toplamSayi} Tam)</span></div>
      <div class="val" style="color:${netRenk};font-size:24px">${ozet.net>=0?'+':''}${p(ozet.net)}</div>
      ${incompleteText}
    </div>
    <div class="ozet-card">
      <div class="lbl">Tam Satış Adedi</div>
      <div class="val accent">${ozet.adet}</div>
    </div>
    <div class="ozet-card">
      <div class="lbl">Tam Satış Geliri</div>
      <div class="val">${p(ozet.gelir)}</div>
    </div>
    <div class="ozet-card">
      <div class="lbl">Alış Maliyeti</div>
      <div class="val" style="color:var(--red)">-${p(ozet.alis)}</div>
    </div>
    <div class="ozet-card">
      <div class="lbl">ROI</div>
      <div class="val accent">${ozet.roi>0?'+':''}${(ozet.roi*100).toFixed(1)}%</div>
    </div>
  `;
}

// ─── Satış listesi ─────────────────────────────────────────────────
function renderListe(satislar, targetId){
  const el=document.getElementById(targetId);
  if(!el)return;
  const siralı=[...satislar].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
  if(!siralı.length){
    el.innerHTML='<div class="empty-state">Bu dönemde satış kaydı yok.</div>';
    return;
  }
  el.innerHTML=siralı.map(s=>{
    const k=satisKar(s);if(!k)return'';
    const pfx=`${targetId}-${s.id}`;
    return `<div class="satis-row" id="sr-${pfx}">
      <div class="sr-baslik">
        <div class="sr-ad">${k.ad}${k.adet>1?` <span style="color:var(--accent)">×${k.adet}</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="sr-net" style="color:${k.veriTam?(k.kararli?'var(--green)':'var(--red)'):'var(--t3)'}">${k.net!=null?(k.net>=0?'+':'')+p(k.net):'—'}</div>
          <button onclick="editAc('${pfx}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:2px 4px" title="Düzenle">✏️</button>
          <button onclick="satisSil('${s.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:2px 4px" title="Sil">✕</button>
        </div>
      </div>
      <div class="sr-meta">${s.tarih||''}${s.tyOrderNumber?` · #${s.tyOrderNumber}`:''}</div>
      <div class="sr-detay">
        <span class="sr-item">Gelir: <b>${p(k.gelir)}</b></span>
        <span class="sr-item">TY Net: <b>${k.tySellerRevenue!=null ? p(k.tySellerRevenue) : '<span style="color:var(--yellow)">Bekleniyor</span>'}</b></span>
        <span class="sr-item">Kargo: <b>${k.tyKargo!=null ? '-'+p(k.tyKargo) : '<span style="color:var(--yellow)">Bekleniyor</span>'}</b></span>
        <span class="sr-item">Alış: <b>${p(k.alis)}</b></span>
        <span class="sr-item">ROI: <b>${k.roi!=null?((k.roi)*100).toFixed(1)+'%':'—'}</b></span>
      </div>
      <div id="edit-form-${pfx}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:3px">Adet</div>
            <input id="ef-adet-${pfx}" type="number" min="1" value="${s.adet||1}" style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t1);font-size:13px">
          </div>
          <div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:3px">Satış Fiyatı (₺)</div>
            <input id="ef-fiyat-${pfx}" type="number" step="0.01" value="${s.gercekFiyat||''}" style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t1);font-size:13px">
          </div>
          <div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:3px">Tarih</div>
            <input id="ef-tarih-${pfx}" type="date" value="${s.tarih||''}" style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t1);font-size:13px">
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="editKaydet('${pfx}','${s.id}')" style="flex:1;padding:7px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Kaydet</button>
          <button onclick="editKapat('${pfx}')" style="padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--t2);font-size:13px;cursor:pointer">İptal</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Edit helpers ───────────────────────────────────────────────────
function toast(msg, tip='info'){
  const c=document.getElementById('toastCont'); if(!c)return;
  const t=document.createElement('div');
  t.className='toast'+(tip==='success'?' success':tip==='error'?' error':'');
  t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function aktifSekmeRender(){
  const aktif=document.querySelector('.rapor-tab.active');
  if(!aktif) return;
  const id=aktif.getAttribute('onclick')?.match(/sekme\('(\w+)'/)?.[1];
  if(id==='gunluk')   renderGunluk();
  else if(id==='haftalik') renderHaftalik();
  else if(id==='aylik')    renderAylik();
  else if(id==='yillik')   renderYillik();
  else if(id==='tumu')     renderTumu();
  else renderGunluk();
}

window.editAc = pfx => {
  document.getElementById(`edit-form-${pfx}`).style.display='block';
};
window.editKapat = pfx => {
  document.getElementById(`edit-form-${pfx}`).style.display='none';
};
window.editKaydet = (pfx, id) => {
  const adet   = +document.getElementById(`ef-adet-${pfx}`).value||1;
  const fiyat  = document.getElementById(`ef-fiyat-${pfx}`).value;
  const tarih  = document.getElementById(`ef-tarih-${pfx}`).value;
  const degisiklik = {adet};
  if(fiyat!=='') degisiklik.gercekFiyat = +fiyat;
  if(tarih!=='') degisiklik.tarih = tarih;
  const ok = satislarDB.guncelle(id, degisiklik);
  if(ok){ toast('Satış güncellendi','success'); aktifSekmeRender(); }
  else   toast('Güncelleme başarısız','error');
};
window.satisSil = id => {
  if(!confirm('Bu satışı silmek istediğinizden emin misiniz?')) return;
  satislarDB.sil(id);
  toast('Satış silindi','success');
  aktifSekmeRender();
};

// ─── Line chart ────────────────────────────────────────────────────
function lineChart(el,data,renk='var(--accent)'){
  if(!el||!data||!data.length){if(el)el.innerHTML='';return;}
  const vMax=Math.max(...data.map(d=>d.val),1);
  const vMin=Math.min(...data.map(d=>d.val),0);
  const range=(vMax-vMin)||1;
  const pts=data.map((d,i)=>({...d,x:data.length>1?(i/(data.length-1))*100:50,y:85-((d.val-vMin)/range)*70}));
  const zY=85-((0-vMin)/range)*70;
  const pathD=`M ${pts.map(pt=>`${pt.x},${pt.y}`).join(' L ')}`;
  const gId='g_'+Math.random().toString(36).substr(2,5);
  el.innerHTML=`<div style="position:relative;width:100%;height:130px;margin-top:16px">
    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;left:0;top:0;overflow:visible">
      <line x1="0" y1="${zY}" x2="100" y2="${zY}" stroke="var(--border)" vector-effect="non-scaling-stroke" stroke-width="1" stroke-dasharray="4"/>
      <linearGradient id="${gId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${renk}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${renk}" stop-opacity="0"/>
      </linearGradient>
      <path d="${pathD} L 100,100 L 0,100 Z" fill="url(#${gId})" vector-effect="non-scaling-stroke"/>
      <path d="${pathD}" fill="none" stroke="${renk}" vector-effect="non-scaling-stroke" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    ${pts.map(pt=>`
      ${pt.label?`<div style="position:absolute;left:${pt.x}%;bottom:0;transform:translateX(-50%);font-size:9px;color:var(--t3);white-space:nowrap">${pt.label}</div>`:''}
      ${pt.val!==0?`<div style="position:absolute;left:${pt.x}%;top:${pt.y}%;transform:translate(-50%,-50%);width:6px;height:6px;background:var(--bg);border:2px solid ${renk};border-radius:50%"></div>`:''}
    `).join('')}
  </div>`;
}

// ─── GÜNLÜK ────────────────────────────────────────────────────────
let curGun = new Date().toISOString().slice(0,10);
function renderGunluk(){
  const d=new Date(curGun+'T12:00:00');
  const gunler=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  document.getElementById('gunluk-lbl').textContent=
    `${gunler[d.getDay()]} ${d.getDate()} ${aylar[d.getMonth()]} ${d.getFullYear()}`;
  const satislar=satislarDB.guneBGore(curGun);
  renderOzet(ozetHesapla(satislar),'gunluk-ozet');
  renderListe(satislar,'gunluk-liste');
}
window.navGun=delta=>{ const d=new Date(curGun+'T12:00:00'); d.setDate(d.getDate()+delta); curGun=d.toISOString().slice(0,10); renderGunluk(); };

// ─── HAFTALIK ──────────────────────────────────────────────────────
function monOfWeek(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
let curHaftaBaslangic = monOfWeek(new Date().toISOString().slice(0,10));
function renderHaftalik(){
  const bas=curHaftaBaslangic;
  const bitD=new Date(bas+'T12:00:00'); bitD.setDate(bitD.getDate()+6);
  const bit=bitD.toISOString().slice(0,10);
  const basD=new Date(bas+'T12:00:00');
  document.getElementById('haftalik-lbl').textContent=
    `${basD.getDate()} ${aylar[basD.getMonth()]} — ${bitD.getDate()} ${aylar[bitD.getMonth()]}`;
  const satislar=satislarDB.aralik(bas,bit);
  renderOzet(ozetHesapla(satislar),'haftalik-ozet');
  renderListe(satislar,'haftalik-liste');
}
window.navHafta=delta=>{
  const d=new Date(curHaftaBaslangic+'T12:00:00'); d.setDate(d.getDate()+delta*7); curHaftaBaslangic=d.toISOString().slice(0,10); renderHaftalik();
};

// ─── AYLIK ─────────────────────────────────────────────────────────
const _now=new Date();
let curAy={y:_now.getFullYear(), m:_now.getMonth()};
function renderAylik(){
  const {y,m}=curAy;
  const bas=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const bit=`${y}-${String(m+1).padStart(2,'0')}-31`;
  document.getElementById('aylik-lbl').textContent=`${aylar[m]} ${y}`;
  const satislar=satislarDB.aralik(bas,bit);
  renderOzet(ozetHesapla(satislar),'aylik-ozet');
  const gunSayisi=new Date(y,m+1,0).getDate();
  const chartData=[];
  for(let g=1;g<=gunSayisi;g++){
    const tarih=`${y}-${String(m+1).padStart(2,'0')}-${String(g).padStart(2,'0')}`;
    const gSat=satislar.filter(s=>s.tarih===tarih);
    let gKar=0; gSat.forEach(s=>{const k=satisKar(s);if(k&&k.net!=null)gKar+=k.net;});
    chartData.push({label:g%5===1||gunSayisi<=10?String(g):'',val:Math.round(gKar)});
  }
  lineChart(document.getElementById('aylik-chart'),chartData);
  renderListe(satislar,'aylik-liste');
}
window.navAy=delta=>{
  curAy.m+=delta;
  if(curAy.m<0){curAy.m=11;curAy.y--;}
  if(curAy.m>11){curAy.m=0;curAy.y++;}
  renderAylik();
};

// ─── YILLIK ────────────────────────────────────────────────────────
let curYil=new Date().getFullYear();
function renderYillik(){
  document.getElementById('yillik-lbl').textContent=String(curYil);
  const satislar=satislarDB.hepsini().filter(s=>s.tarih?.startsWith(String(curYil)));
  renderOzet(ozetHesapla(satislar),'yillik-ozet');
  const chartData=[];
  for(let i=1;i<=12;i++){
    const ayStr=`${curYil}-${String(i).padStart(2,'0')}`;
    const aySat=satislar.filter(s=>s.tarih?.startsWith(ayStr));
    let aKar=0; aySat.forEach(s=>{const k=satisKar(s);if(k&&k.net!=null)aKar+=k.net;});
    chartData.push({label:aylar[i-1].slice(0,3),val:Math.round(aKar)});
  }
  lineChart(document.getElementById('yillik-chart'),chartData);
  renderListe(satislar,'yillik-liste');
}
window.navYil=delta=>{ curYil+=delta; renderYillik(); };

// ─── TÜMÜ ──────────────────────────────────────────────────────────
function renderTumu(){
  const satislar=satislarDB.hepsini();
  renderOzet(ozetHesapla(satislar),'tumu-ozet');
  renderListe(satislar,'tumu-liste');
}

// ─── SEKME ─────────────────────────────────────────────────────────
const PANELER=['gunluk','haftalik','aylik','yillik','tumu'];
window.sekme=(id,btn)=>{
  PANELER.forEach(p=>{
    document.getElementById('pane-'+p).style.display=p===id?'':'none';
  });
  document.querySelectorAll('.rapor-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='gunluk')   renderGunluk();
  if(id==='haftalik') renderHaftalik();
  if(id==='aylik')    renderAylik();
  if(id==='yillik')   renderYillik();
  if(id==='tumu')     renderTumu();
};

// ─── EXCEL ─────────────────────────────────────────────────────────
window.excelIndir=async()=>{
  try{
    const {utils,writeFile}=await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const satislar=satislarDB.hepsini().sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
    const rows=satislar.map(s=>{
      const k=satisKar(s);if(!k)return null;
      return {Tarih:s.tarih,Ürün:k.ad,Tip:s.tip,Adet:s.adet,
        'Gelir (₺)':+k.gelir.toFixed(2),
        'TY Net (₺)':k.tySellerRevenue!=null?+k.tySellerRevenue.toFixed(2):'',
        'Kargo (₺)':k.tyKargo!=null?+k.tyKargo.toFixed(2):'',
        'Alış (₺)':+k.alis.toFixed(2),
        'Net Kar (₺)':k.net!=null?+k.net.toFixed(2):'',
        'ROI %':k.roi!=null&&k.alis>0?+((k.roi)*100).toFixed(1):'',
        'Sipariş No':s.tyOrderNumber||''};
    }).filter(Boolean);
    const ws=utils.json_to_sheet(rows);
    const wb=utils.book_new();
    utils.book_append_sheet(wb,ws,'Satışlar');
    writeFile(wb,`satis-rapor-${new Date().toISOString().slice(0,10)}.xlsx`);
  } catch(e){ alert('Excel hatası: '+e.message); }
};

// ─── İLK YÜKLEMEleme ───────────────────────────────────────────────
renderGunluk();

</script>
