<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Satış Girişi · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">🛒 Satış Girişi</div>
    <div id="tarih-goster" style="font-size:12px;color:var(--t3)"></div>
    <div class="topbar-action" onclick="excelIndir()">⬇</div>
  </div>
  <div class="page-content">
    <!-- ÖZET -->
    <div class="stat-grid mb-16">
      <div class="stat-card"><div class="stat-label">Bugün Satılan</div><div class="stat-value accent" id="ozet-adet">0</div><div class="stat-sub">adet</div></div>
      <div class="stat-card"><div class="stat-label">Gerçek Kar</div><div class="stat-value green" id="ozet-kar">0₺</div><div class="stat-sub">net</div></div>
    </div>
    <!-- SATIŞ EKLE -->
    <div class="card mb-16">
      <div class="card-title mb-12">Satış Ekle</div>
      <div class="tabs mb-12">
        <div class="tab active" id="tip-tab-urun" onclick="tipSec('urun')">Ürün</div>
        <div class="tab" id="tip-tab-set" onclick="tipSec('set')">Set</div>
      </div>
      <div class="form-group">
        <label class="form-label" id="secim-label">Ürün Seç</label>
        <select class="form-select" id="satis-hedef" onchange="hedefSecildi()">
          <option value="">— Seçin —</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Adet</label>
          <input class="form-input" type="number" id="satis-adet" value="1" min="1" oninput="hedefSecildi()">
        </div>
        <div class="form-group">
          <label class="form-label">Tarih</label>
          <input class="form-input" type="date" id="satis-tarih">
        </div>
      </div>
      <!-- SATIŞ FİYATI (varsayılan = kayıtlı fiyat, değiştirilebilir) -->
      <div class="form-group">
        <label class="form-label">Satış Fiyatı (₺) <span style="color:var(--t3);font-weight:400">— değiştirilebilir</span></label>
        <input class="form-input" type="number" id="satis-fiyat" placeholder="0.00" step="0.01" oninput="karOniziGoster()">
      </div>
      <!-- ÖNIZLEME -->
      <div id="satis-onizleme" style="display:none;background:var(--bg3);border-radius:var(--r-md);padding:10px 12px;margin-bottom:12px;font-size:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--t3)">Stok</span><span id="on-stok" style="font-weight:600">—</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--t3)">Önerilen Fiyat</span><span id="on-onerilen" style="font-weight:600;color:var(--accent)">—</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--t3)">Gerçek Kar</span><span id="on-kar" style="font-weight:700;font-family:var(--mono)">—</span>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="satisEkle()">✓ Satışı Kaydet</button>
    </div>
    <!-- BUGÜNÜN SATIŞLARI -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Bugünün Satışları</div>
        <span id="bugun-sayi" style="font-size:12px;color:var(--t3)"></span>
      </div>
      <div id="bugun-satis-listesi"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a class="nav-item" href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Panel</span></a>
    <a class="nav-item" href="./fiyatlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="nav-label">Ürün/Set</span></a>
    <a class="nav-item active" href="./satis-giris.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg><span class="nav-label">Satış</span></a>
    <a class="nav-item" href="./stok.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><span class="nav-label">Stok</span></a>
    <a class="nav-item" href="./ayarlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nav-label">Ayarlar</span></a>
  </nav>
</div>
<div class="toast-container" id="toastCont"></div>
<script type="module">
import{auth,urunlerDB,setlerDB,satislarDB,ayarlarDB,hesapla}from'./state.js';
import{kargoUcreti}from'./kargo.js';
if(!auth.oturum()) window.location.href='./index.html';
const ayarlar=ayarlarDB.oku();
const bugunStr=new Date().toISOString().slice(0,10);
document.getElementById('satis-tarih').value=bugunStr;
document.getElementById('tarih-goster').textContent=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long'});
const p=n=>(+n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';
let aktifTip='urun';

window.tipSec=t=>{
  aktifTip=t;
  document.getElementById('tip-tab-urun').classList.toggle('active',t==='urun');
  document.getElementById('tip-tab-set').classList.toggle('active',t==='set');
  document.getElementById('secim-label').textContent=t==='urun'?'Ürün Seç':'Set Seç';
  doldurDropdown();
  document.getElementById('satis-onizleme').style.display='none';
  document.getElementById('satis-fiyat').value='';
};

function doldurDropdown(){
  const sel=document.getElementById('satis-hedef');
  if(aktifTip==='urun'){
    const liste=urunlerDB.olusturulanlar();
    if(!liste.length){sel.innerHTML='<option value="">— Önce Ürün/Set Oluştur sayfasından ekleyin —</option>';return;}
    sel.innerHTML='<option value="">— Seçin —</option>'+liste.map(x=>
      `<option value="${x.id}">${x.ad} | Stok: ${x.stok||0}</option>`).join('');
  } else {
    const liste=setlerDB.hepsini();
    if(!liste.length){sel.innerHTML='<option value="">— Önce Set Oluştur sayfasından ekleyin —</option>';return;}
    sel.innerHTML='<option value="">— Seçin —</option>'+liste.map(x=>{
      const max=setlerDB.maxAdet(x.id);
      return `<option value="${x.id}"${max===0?' disabled':''}">${x.ad} | Max: ${max} set</option>`;
    }).join('');
  }
}

window.hedefSecildi=()=>{
  const id=document.getElementById('satis-hedef').value;
  const adet=+document.getElementById('satis-adet').value||1;
  if(!id){document.getElementById('satis-onizleme').style.display='none';return;}
  const obj=aktifTip==='urun'?urunlerDB.bul(id):setlerDB.bul(id);
  if(!obj) return;
  // Varsayılan fiyatı doldur
  const alisTop=aktifTip==='urun'?obj.alisFiyati*(obj.paketAdet||1):obj.alisMaliyeti||0;
  const urunB=aktifTip==='urun'?obj:{alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04};
  const desiH=obj.desi||(aktifTip==='set'?2:1);
  const kargoFUH=kargoUcreti(ayarlar.kargoFirma||'Aras',desiH);
  const f=hesapla.satisFiyati(urunB,ayarlar,aktifTip==='urun'?(obj.paketAdet||1):1,kargoFUH);
  const varsayilanFiyat=obj.satisFiyatiGercek||f?.yuvarlak||0;
  document.getElementById('satis-fiyat').value=varsayilanFiyat||'';
  document.getElementById('satis-onizleme').style.display='';
  document.getElementById('on-stok').textContent=(obj.stok||0)+' adet';
  document.getElementById('on-onerilen').textContent=f?p(f.yuvarlak):'—';
  karOniziGoster();
};

window.karOniziGoster=()=>{
  const id=document.getElementById('satis-hedef').value;
  const fiyat=+document.getElementById('satis-fiyat').value||0;
  if(!id||!fiyat){document.getElementById('on-kar').textContent='—';document.getElementById('on-kar').style.color='var(--t3)';return;}
  const obj=aktifTip==='urun'?urunlerDB.bul(id):setlerDB.bul(id);if(!obj) return;
  const alisTop=aktifTip==='urun'?obj.alisFiyati*(obj.paketAdet||1):obj.alisMaliyeti||0;
  const urunB=aktifTip==='urun'?obj:{alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04};
  const desiH=obj.desi||(aktifTip==='set'?2:1);
  const kargoFUH=kargoUcreti(ayarlar.kargoFirma||'Aras',desiH);
  const f=hesapla.satisFiyati(urunB,ayarlar,aktifTip==='urun'?(obj.paketAdet||1):1,kargoFUH);if(!f) return;
  const kar=hesapla.gercekKar(alisTop,fiyat,obj.komisyon||0.04,f.platform,f.kargo);
  document.getElementById('on-kar').textContent=(kar.kararli?'✅ ':' ❌ ')+p(kar.net)+' (ROI: %'+Math.round(kar.roi*100)+')';
  document.getElementById('on-kar').style.color=kar.kararli?'var(--green)':'var(--red)';
};

window.satisEkle=()=>{
  const hedefId=document.getElementById('satis-hedef').value,adet=+document.getElementById('satis-adet').value,tarih=document.getElementById('satis-tarih').value,fiyat=+document.getElementById('satis-fiyat').value||0;
  if(!hedefId){toast('Ürün veya set seçin','error');return;}
  if(!adet||adet<1){toast('Geçerli adet girin','error');return;}
  const obj=aktifTip==='urun'?urunlerDB.bul(hedefId):setlerDB.bul(hedefId);
  // Set için maxAdet kontrolü, ürün için stok kontrolü
  if(aktifTip==='set'){
    const max=setlerDB.maxAdet(hedefId);
    if(max<adet&&!confirm(`Stok yetersiz (max ${max} set yapılabilir). Yine de kaydet?`)) return;
  } else {
    if((obj.stok||0)<adet&&!confirm(`Stok yetersiz (${obj.stok||0} adet). Yine de kaydet?`)) return;
  }
  satislarDB.ekle([{tip:aktifTip,hedefId,adet,gercekFiyat:fiyat,tarih}]);
  document.getElementById('satis-hedef').value='';document.getElementById('satis-adet').value='1';document.getElementById('satis-fiyat').value='';
  document.getElementById('satis-onizleme').style.display='none';
  doldurDropdown();renderBugun();renderOzet();
  toast(obj.ad+' — '+adet+' adet kaydedildi','success');
};

function renderOzet(){
  const satislar=satislarDB.guneBGore(bugunStr);let adet=0,kar=0;
  satislar.forEach(s=>{
    adet+=s.adet;
    const obj=s.tip==='urun'?urunlerDB.bul(s.hedefId):setlerDB.bul(s.hedefId);if(!obj) return;
    const alisTop=s.tip==='urun'?obj.alisFiyati*(obj.paketAdet||1):obj.alisMaliyeti||0;
    const urunB=s.tip==='urun'?obj:{alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04};
    const f=hesapla.satisFiyati(urunB,ayarlar,s.tip==='urun'?(obj.paketAdet||1):1);if(!f) return;
    const k=hesapla.gercekKar(alisTop,s.gercekFiyat||f.yuvarlak,obj.komisyon||0.04,f.platform,f.kargo);
    kar+=k.net*s.adet;
  });
  document.getElementById('ozet-adet').textContent=adet;
  document.getElementById('ozet-kar').textContent=p(kar);
  document.getElementById('ozet-kar').style.color=kar>=0?'var(--green)':'var(--red)';
}

function renderBugun(){
  const satislar=[...satislarDB.guneBGore(bugunStr)].reverse();
  document.getElementById('bugun-sayi').textContent=satislar.length+' kayıt';
  const el=document.getElementById('bugun-satis-listesi');
  if(!satislar.length){el.innerHTML='<div class="empty-state" style="padding:20px"><div class="empty-icon">🛒</div><div class="empty-title">Henüz satış yok</div></div>';return;}
  el.innerHTML=satislar.map(s=>{
    const obj=s.tip==='urun'?urunlerDB.bul(s.hedefId):setlerDB.bul(s.hedefId);if(!obj) return'';
    const alisTop=s.tip==='urun'?obj.alisFiyati*(obj.paketAdet||1):obj.alisMaliyeti||0;
    const urunB=s.tip==='urun'?obj:{alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04};
    const f=hesapla.satisFiyati(urunB,ayarlar,s.tip==='urun'?(obj.paketAdet||1):1);
    const fiyat=s.gercekFiyat||f?.yuvarlak||0;
    const kar=f?hesapla.gercekKar(alisTop,fiyat,obj.komisyon||0.04,f.platform,f.kargo):null;
    return`<div class="urun-row"><div class="urun-avatar">${s.tip==='set'?'📦':'🛍️'}</div><div class="urun-info"><div class="urun-ad">${obj.ad}</div><div class="urun-meta">${s.adet} adet · ${fiyat.toLocaleString('tr-TR')}₺ · ${s.tarih}</div></div><div class="urun-fiyat"><div class="urun-fiyat-ana" style="color:${kar?.kararli?'var(--green)':'var(--red)'}">${kar?p(kar.net):'—'}</div><button onclick="satisIptal('${s.id}')" style="font-size:11px;color:var(--red);background:var(--red-l);border:none;border-radius:6px;padding:3px 8px;margin-top:4px;cursor:pointer">✕ İptal</button></div></div>`;
  }).join('');
}

window.satisSil=id=>{if(!confirm('Bu satışı silmek ve stoğu geri yüklemek ister misiniz?'))return;satislarDB.sil(id);doldurDropdown();renderBugun();renderOzet();toast('Silindi','info');};
window.satisIptal=id=>{
  const k=satislarDB.hepsini().find(s=>s.id===id);
  if(!k) return;
  const obj=k.tip==='set'?setlerDB.bul(k.hedefId):urunlerDB.bul(k.hedefId||k.urunId);
  const ad=obj?obj.ad:'Satış';
  if(!confirm('"'+ad+'" satışını iptal etmek istiyor musunuz? Stoklar geri yüklenecek.')) return;
  satislarDB.sil(id);
  doldurDropdown();renderBugun();renderOzet();
  toast('Satış iptal edildi, stoklar güncellendi','success');
};

window.excelIndir=async()=>{
  const{utils,writeFile}=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
  const data=satislarDB.hepsini().map(s=>{
    const obj=s.tip==='urun'?urunlerDB.bul(s.hedefId):setlerDB.bul(s.hedefId);
    const alisTop=obj?(s.tip==='urun'?obj.alisFiyati*(obj.paketAdet||1):obj.alisMaliyeti||0):0;
    const urunB=obj?(s.tip==='urun'?obj:{alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04}):null;
    const f=urunB?hesapla.satisFiyati(urunB,ayarlar,s.tip==='urun'?(obj.paketAdet||1):1):null;
    const fiyat=s.gercekFiyat||f?.yuvarlak||0;
    const kar=f?hesapla.gercekKar(alisTop,fiyat,obj.komisyon||0.04,f.platform,f.kargo):null;
    return{'Tarih':s.tarih,'Tip':s.tip==='set'?'Set':'Ürün','Ad':obj?.ad||'?','Adet':s.adet,'Satış Fiyatı':fiyat,'Net Kar':kar?kar.net.toFixed(2):'','ROI %':kar?Math.round(kar.roi*100):''};
  });
  const ws=utils.json_to_sheet(data);const wb=utils.book_new();utils.book_append_sheet(wb,ws,'Satışlar');
  writeFile(wb,'satislar_'+bugunStr+'.xlsx');toast('Excel indirildi','success');
};

window.toast=(msg,tip='info')=>{const c=document.getElementById('toastCont');const el=document.createElement('div');el.className='toast '+tip;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3000);};

doldurDropdown();renderBugun();renderOzet();
</script>
</body>
</html>
