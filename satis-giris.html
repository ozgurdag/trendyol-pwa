<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Satış Girişi · Satış Yönetim</title>
<link rel="stylesheet" href="./app.css">
<style>
/* ── SEPET ── */
.sepet-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border-radius:var(--r-md);
  padding:10px 12px;margin-bottom:8px;
}
.sepet-item-info{flex:1;min-width:0;}
.sepet-item-ad{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sepet-item-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.sepet-item-kar{font-size:13px;font-weight:700;font-family:var(--mono);white-space:nowrap;}
.sepet-sil{width:28px;height:28px;background:var(--red-l);border:none;border-radius:6px;color:var(--red);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
/* ── FİLTRE TABS ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--t3);border:1px solid var(--border2);cursor:pointer;transition:all .15s;}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* ── SATIŞ SATIRI ── */
.satis-row{padding:12px 0;border-bottom:1px solid var(--border);}
.satis-row:last-child{border-bottom:none;}
.satis-row-header{display:flex;align-items:center;gap:10px;}
.satis-avatar{width:38px;height:38px;background:var(--bg3);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.satis-info{flex:1;min-width:0;}
.satis-ad{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.satis-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.satis-kar{text-align:right;flex-shrink:0;}
.satis-kar-val{font-size:14px;font-weight:700;font-family:var(--mono);}
.satis-aksiyonlar{display:flex;gap:6px;margin-top:8px;padding-left:48px;}
/* ── DÜZENLEME FORMU ── */
.edit-form{background:var(--bg3);border-radius:var(--r-md);padding:12px;margin-top:8px;margin-left:48px;}
.edit-form .form-row{margin-bottom:10px;}
.edit-form-btns{display:flex;gap:6px;}
/* ── ÖZET TOPLAM ── */
.ozet-toplam{background:linear-gradient(135deg,var(--accent-l),transparent);border:1px solid var(--accent);border-radius:var(--r-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ozet-toplam-label{font-size:12px;color:var(--t2);}
.ozet-toplam-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent);}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">🛒 Satış Girişi</div>
    <div id="tarih-goster" style="font-size:12px;color:var(--t3)"></div>
    <div class="topbar-action" onclick="excelIndir()" title="Excel İndir">⬇</div>
  </div>
  <div class="page-content">

    <!-- GENEL ÖZET -->
    <div class="stat-grid mb-16">
      <div class="stat-card">
        <div class="stat-label">Toplam Satış</div>
        <div class="stat-value accent" id="ozet-adet">0</div>
        <div class="stat-sub">adet</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Toplam Kar</div>
        <div class="stat-value green" id="ozet-kar">0₺</div>
        <div class="stat-sub">net</div>
      </div>
    </div>

    <!-- SATIŞ EKLE -->
    <div class="card mb-16">
      <div class="card-title mb-12">Satış Ekle</div>
      <div class="tabs mb-12">
        <div class="tab active" id="tip-tab-listing" onclick="tipSec('listing')">Listing</div>
        <div class="tab" id="tip-tab-set" onclick="tipSec('set')">Set</div>
      </div>

      <!-- Ürün seç -->
      <div class="form-group">
        <label class="form-label" id="secim-label">Ürün Seç</label>
        <select class="form-select" id="satis-hedef" onchange="hedefSecildi()">
          <option value="">— Seçin —</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Adet</label>
          <input class="form-input" type="number" id="satis-adet" value="1" min="1" oninput="karOniziGoster()">
        </div>
        <div class="form-group">
          <label class="form-label">Satış Fiyatı (₺)</label>
          <input class="form-input" type="number" id="satis-fiyat" placeholder="0.00" step="0.01" oninput="karOniziGoster()">
        </div>
      </div>

      <!-- Tarih -->
      <div class="form-group">
        <label class="form-label">Tarih</label>
        <input class="form-input" type="date" id="satis-tarih">
      </div>

      <!-- Önizleme -->
      <div id="satis-onizleme" style="display:none;background:var(--bg3);border-radius:var(--r-md);padding:10px 12px;margin-bottom:12px;font-size:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--t3)">Stok</span><span id="on-stok" style="font-weight:600">—</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--t3)">Önerilen Fiyat</span><span id="on-onerilen" style="font-weight:600;color:var(--accent)">—</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--t3)">Kar (bu ürün)</span><span id="on-kar" style="font-weight:700;font-family:var(--mono)">—</span>
        </div>
      </div>

      <button class="btn btn-secondary btn-full mb-8" onclick="sepeteEkle()">＋ Sepete Ekle</button>

      <!-- SEPET -->
      <div id="sepet-wrap" style="display:none;margin-bottom:12px">
        <div class="card-title mb-8" style="font-size:11px">Sepet</div>
        <div id="sepet-liste"></div>
        <div class="ozet-toplam" id="sepet-toplam-wrap">
          <span class="ozet-toplam-label">Toplam Kar Tahmini</span>
          <span class="ozet-toplam-val" id="sepet-toplam-kar">—</span>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="satislariKaydet()">✓ Satışları Kaydet</button>
    </div>

    <!-- TÜM SATIŞLAR -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Satışlar</div>
        <span id="satis-sayi" style="font-size:12px;color:var(--t3)"></span>
      </div>

      <!-- Filtre -->
      <div class="filter-tabs" id="filtre-tabs">
        <div class="filter-tab active" onclick="filtreAyarla('bugun')" id="f-bugun">Bugün</div>
        <div class="filter-tab" onclick="filtreAyarla('hafta')" id="f-hafta">Bu Hafta</div>
        <div class="filter-tab" onclick="filtreAyarla('ay')" id="f-ay">Bu Ay</div>
        <div class="filter-tab" onclick="filtreAyarla('tumü')" id="f-tumu">Tümü</div>
      </div>

      <div id="satis-listesi"></div>
    </div>

  </div><!-- /page-content -->

  <nav class="bottom-nav">
    <a class="nav-item" href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Panel</span></a>
    <a class="nav-item" href="./fiyatlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="nav-label">Ürün/Set</span></a>
    <a class="nav-item active" href="./satis-giris.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg><span class="nav-label">Satış</span></a>
    <a class="nav-item" href="./stok.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><span class="nav-label">Stok</span></a>
    <a class="nav-item" href="./alis-hesap.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span class="nav-label">Max Alış</span></a>
    <a class="nav-item" href="./rapor.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Rapor</span></a>
    <a class="nav-item" href="./ayarlar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nav-label">Ayarlar</span></a>
  </nav>
</div><!-- /app-shell -->

<div class="toast-container" id="toastCont"></div>

<script type="module">
import { auth, stokDB, listingDB, setlerDB, satislarDB, ayarlarDB, hesapla } from './state.js';
import { kargoUcreti } from './kargo.js';

if(!auth.oturum()?.token) { window.location.href='./index.html'; }

// ── DURUM ────────────────────────────────────────────────────────
const ayarlar = ayarlarDB.oku();
const bugunStr = new Date().toISOString().slice(0,10);
document.getElementById('satis-tarih').value = bugunStr;
document.getElementById('tarih-goster').textContent = new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long'});

const p = n => (+n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+'₺';

let aktifTip = 'listing';
let aktifFiltre = 'bugun';
let sepet = [];          // [{tip, hedefId, ad, adet, gercekFiyat, karSnapshot}]
let editId = null;       // düzenlenen satış id'si

// ── TİP SEÇ ──────────────────────────────────────────────────────
window.tipSec = t => {
  aktifTip = t;
  document.getElementById('tip-tab-listing').classList.toggle('active', t==='listing');
  document.getElementById('tip-tab-set').classList.toggle('active', t==='set');
  document.getElementById('secim-label').textContent = t==='listing' ? 'Ürün Seç' : 'Set Seç';
  doldurDropdown();
  document.getElementById('satis-onizleme').style.display = 'none';
  document.getElementById('satis-fiyat').value = '';
};

// ── DROPDOWN DOLDUR ───────────────────────────────────────────────
function doldurDropdown(){
  const sel = document.getElementById('satis-hedef');
  if(aktifTip==='listing'){
    const liste = listingDB.onaylananlar();
    if(!liste.length){ sel.innerHTML='<option value="">— Önce Listing sayfasından onaylayın —</option>'; return; }
    const stokOzeti = id => {
      const u = listingDB.bul(id);
      const b = u?.stokBilesenleri||[];
      if(!b.length) return '?';
      return Math.min(...b.map(x=>{ const s=stokDB.bul(x.urunId); return s?Math.floor((s.stok||0)/x.adet):0; }));
    };
    sel.innerHTML = '<option value="">— Seçin —</option>' + liste.map(x => {
      const max = stokOzeti(x.id);
      return `<option value="${x.id}"${max===0?' disabled':''}>${x.ad} | Max: ${max}</option>`;
    }).join('');
  } else {
    const liste = setlerDB.onaylananlar();
    if(!liste.length){ sel.innerHTML='<option value="">— Önce Listing sayfasından set onaylayın —</option>'; return; }
    sel.innerHTML = '<option value="">— Seçin —</option>' + liste.map(x => {
      const max = setlerDB.maxAdet(x.id);
      return `<option value="${x.id}"${max===0?' disabled':''}>${x.ad} | Max: ${max} set</option>`;
    }).join('');
  }
}

// ── HEDEF SEÇİLDİ ────────────────────────────────────────────────
window.hedefSecildi = () => {
  const id = document.getElementById('satis-hedef').value;
  if(!id){ document.getElementById('satis-onizleme').style.display='none'; return; }
  const obj = aktifTip==='set' ? setlerDB.bul(id) : listingDB.bul(id);
  if(!obj) return;

  const desiH = obj.desi||(aktifTip==='set'?2:1);
  const kargoFU = kargoUcreti(ayarlar.kargoFirma||'Aras', desiH);
  const urunB = aktifTip==='set'
    ? {alisFiyati:obj.alisMaliyeti||0,desi:desiH,komisyon:obj.komisyon||0.04,ayniGunKargo:obj.ayniGunKargo||false,hedefKar:obj.hedefKar||0.30}
    : {...obj};
  const f = hesapla.satisFiyati(urunB, ayarlar, 1, kargoFU);
  const varsayilanFiyat = obj.satisFiyatiGercek || f?.yuvarlak || 0;

  document.getElementById('satis-fiyat').value = varsayilanFiyat || '';
  document.getElementById('satis-onizleme').style.display = '';

  if(aktifTip==='listing'){
    const b = obj.stokBilesenleri||[];
    const max = b.length ? Math.min(...b.map(x=>{ const s=stokDB.bul(x.urunId); return s?Math.floor((s.stok||0)/x.adet):0; })) : 0;
    document.getElementById('on-stok').textContent = max + ' adet yapılabilir';
  } else {
    document.getElementById('on-stok').textContent = (setlerDB.maxAdet(id)||0) + ' set';
  }
  document.getElementById('on-onerilen').textContent = f ? p(f.yuvarlak) : '—';
  karOniziGoster();
};

// ── KAR ÖNİZLE ───────────────────────────────────────────────────
window.karOniziGoster = () => {
  const id = document.getElementById('satis-hedef').value;
  const fiyat = +document.getElementById('satis-fiyat').value||0;
  const el = document.getElementById('on-kar');
  if(!id||!fiyat){ el.textContent='—'; el.style.color='var(--t3)'; return; }
  const obj = aktifTip==='set' ? setlerDB.bul(id) : listingDB.bul(id);
  if(!obj) return;
  const desiH = obj.desi||(aktifTip==='set'?2:1);
  const kargoFU = kargoUcreti(ayarlar.kargoFirma||'Aras', desiH);
  const urunB = aktifTip==='set' ? {alisFiyati:obj.alisMaliyeti||0,desi:desiH,komisyon:obj.komisyon||0.04,ayniGunKargo:obj.ayniGunKargo||false,hedefKar:obj.hedefKar||0.30} : {...obj};
  const f = hesapla.satisFiyati(urunB, ayarlar, 1, kargoFU);
  if(!f) return;
  const alisTop = aktifTip==='set' ? (obj.alisMaliyeti||0) : (obj.alisFiyati||0);
  const adet = +document.getElementById('satis-adet').value||1;
  const kar = hesapla.gercekKar(alisTop, fiyat, obj.komisyon||0.04, f.platform, f.kargo);
  el.textContent = (kar.kararli?'✅ ':' ❌ ') + p(kar.net*adet) + ' (ROI: %'+Math.round(kar.roi*100)+')';
  el.style.color = kar.kararli ? 'var(--green)' : 'var(--red)';
};

// ── SEPETE EKLE ───────────────────────────────────────────────────
window.sepeteEkle = () => {
  const id = document.getElementById('satis-hedef').value;
  const adet = +document.getElementById('satis-adet').value||1;
  const fiyat = +document.getElementById('satis-fiyat').value||0;
  if(!id){ toast('Ürün veya set seçin','error'); return; }
  if(adet<1){ toast('Geçerli adet girin','error'); return; }
  if(!fiyat){ toast('Satış fiyatı girin','error'); return; }

  const obj = aktifTip==='set' ? setlerDB.bul(id) : listingDB.bul(id);
  if(!obj) return;

  const desiH = obj.desi||(aktifTip==='set'?2:1);
  const kargoFU = kargoUcreti(ayarlar.kargoFirma||'Aras', desiH);
  const urunB = aktifTip==='set' ? {alisFiyati:obj.alisMaliyeti||0,desi:desiH,komisyon:obj.komisyon||0.04,ayniGunKargo:obj.ayniGunKargo||false,hedefKar:obj.hedefKar||0.30} : {...obj};
  const f = hesapla.satisFiyati(urunB, ayarlar, 1, kargoFU);
  const alisTop = aktifTip==='set' ? (obj.alisMaliyeti||0) : (obj.alisFiyati||0);
  let karSnapshot = null;
  if(f){
    const kar = hesapla.gercekKar(alisTop, fiyat, obj.komisyon||0.04, f.platform, f.kargo);
    karSnapshot = {net: kar.net, roi: kar.roi, kararli: kar.kararli};
  }

  sepet.push({tip:aktifTip, hedefId:id, ad:obj.ad, adet, gercekFiyat:fiyat, karSnapshot});
  renderSepet();

  // Formu sıfırla
  document.getElementById('satis-hedef').value='';
  document.getElementById('satis-adet').value='1';
  document.getElementById('satis-fiyat').value='';
  document.getElementById('satis-onizleme').style.display='none';
  toast(obj.ad+' sepete eklendi','success');
};

// ── SEPET RENDER ─────────────────────────────────────────────────
function renderSepet(){
  const wrap = document.getElementById('sepet-wrap');
  const liste = document.getElementById('sepet-liste');
  if(!sepet.length){ wrap.style.display='none'; return; }
  wrap.style.display='';

  let toplamKar = 0;
  liste.innerHTML = sepet.map((item,i) => {
    const karStr = item.karSnapshot
      ? (item.karSnapshot.kararli?'✅ ':' ❌ ') + p(item.karSnapshot.net * item.adet) + ' (%'+Math.round(item.karSnapshot.roi*100)+')'
      : '—';
    if(item.karSnapshot) toplamKar += item.karSnapshot.net * item.adet;
    return `<div class="sepet-item">
      <div class="sepet-item-info">
        <div class="sepet-item-ad">${item.ad}</div>
        <div class="sepet-item-meta">${item.adet} adet · ${p(item.gercekFiyat)} · ${item.tip==='set'?'Set':'Listing'}</div>
        <div class="sepet-item-kar" style="color:${item.karSnapshot?.kararli?'var(--green)':'var(--red)'}">${karStr}</div>
      </div>
      <button class="sepet-sil" onclick="sepetSil(${i})">✕</button>
    </div>`;
  }).join('');

  document.getElementById('sepet-toplam-kar').textContent = p(toplamKar);
  document.getElementById('sepet-toplam-kar').style.color = toplamKar>=0 ? 'var(--accent)' : 'var(--red)';
}

window.sepetSil = i => {
  sepet.splice(i,1);
  renderSepet();
};

// ── SATIŞLARI KAYDET ─────────────────────────────────────────────
window.satislariKaydet = () => {
  // Sepet boşsa tek ürün modunda kaydet
  if(!sepet.length){
    const id = document.getElementById('satis-hedef').value;
    const adet = +document.getElementById('satis-adet').value||1;
    const fiyat = +document.getElementById('satis-fiyat').value||0;
    const tarih = document.getElementById('satis-tarih').value;
    if(!id){ toast('Ürün seçin veya sepete ekleyin','error'); return; }
    if(!fiyat){ toast('Satış fiyatı girin','error'); return; }
    // Stok kontrolü
    if(!stokKontrolEt([{tip:aktifTip,hedefId:id,adet}])) return;
    satislarDB.ekle([{tip:aktifTip,hedefId:id,adet,gercekFiyat:fiyat,tarih}]);
    const obj = aktifTip==='set'?setlerDB.bul(id):listingDB.bul(id);
    document.getElementById('satis-hedef').value='';
    document.getElementById('satis-adet').value='1';
    document.getElementById('satis-fiyat').value='';
    document.getElementById('satis-onizleme').style.display='none';
    doldurDropdown(); renderSatisList(); renderOzet();
    toast((obj?.ad||'Ürün')+' — '+adet+' adet kaydedildi','success');
    return;
  }

  const tarih = document.getElementById('satis-tarih').value;
  if(!stokKontrolEt(sepet)) return;
  satislarDB.ekle(sepet.map(item=>({tip:item.tip,hedefId:item.hedefId,adet:item.adet,gercekFiyat:item.gercekFiyat,tarih})));
  toast(sepet.length+' ürün kaydedildi','success');
  sepet=[];
  renderSepet();
  doldurDropdown(); renderSatisList(); renderOzet();
};

// ── STOK KONTROLÜ ────────────────────────────────────────────────
function stokKontrolEt(items){
  for(const item of items){
    if(item.tip==='listing'){
      const obj = listingDB.bul(item.hedefId);
      if(!obj) continue;
      const b = obj.stokBilesenleri||[];
      const max = b.length ? Math.min(...b.map(x=>{ const s=stokDB.bul(x.urunId); return s?Math.floor((s.stok||0)/x.adet):0; })) : 0;
      if(max < item.adet && !confirm(`"${obj.ad}" için stok yetersiz (max ${max} adet). Yine de kaydet?`)) return false;
    } else if(item.tip==='set'){
      const max = setlerDB.maxAdet(item.hedefId);
      const obj = setlerDB.bul(item.hedefId);
      if(max < item.adet && !confirm(`"${obj?.ad}" için stok yetersiz (max ${max} set). Yine de kaydet?`)) return false;
    }
  }
  return true;
}

// ── FİLTRE ───────────────────────────────────────────────────────
window.filtreAyarla = f => {
  aktifFiltre = f;
  ['bugun','hafta','ay','tumu'].forEach(k => {
    document.getElementById('f-'+k)?.classList.toggle('active', k===f);
  });
  renderSatisList();
};

function filtreliSatislar(){
  const hepsi = [...satislarDB.hepsini()].sort((a,b)=>b.tarih.localeCompare(a.tarih)||b.kayitTarih-a.kayitTarih);
  const bugun = new Date().toISOString().slice(0,10);
  if(aktifFiltre==='bugun') return hepsi.filter(s=>s.tarih===bugun);
  if(aktifFiltre==='hafta'){
    const d = new Date(); d.setDate(d.getDate()-6);
    const bas = d.toISOString().slice(0,10);
    return hepsi.filter(s=>s.tarih>=bas);
  }
  if(aktifFiltre==='ay'){
    const bas = bugun.slice(0,7)+'-01';
    return hepsi.filter(s=>s.tarih>=bas);
  }
  return hepsi; // tümü
}

// ── ÖZET ─────────────────────────────────────────────────────────
function renderOzet(){
  const satislar = filtreliSatislar();
  let adet = 0, kar = 0;
  satislar.forEach(s => {
    adet += s.adet;
    kar += hesaplaKar(s) * s.adet;
  });
  document.getElementById('ozet-adet').textContent = adet;
  document.getElementById('ozet-kar').textContent = p(kar);
  document.getElementById('ozet-kar').style.color = kar>=0 ? 'var(--green)' : 'var(--red)';
}

// ── KAR HESAPLA (snapshot varsa kullan) ──────────────────────────
function hesaplaKar(s){
  if(s.snapshot) return s.snapshot.netKar;
  // Fallback: anlık ayarlarla hesapla
  const obj = s.tip==='listing' ? listingDB.bul(s.hedefId) : setlerDB.bul(s.hedefId);
  if(!obj) return 0;
  const alisTop = s.tip==='listing' ? (obj.alisFiyati||0) : (obj.alisMaliyeti||0);
  const urunB = s.tip==='set' ? {alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04,ayniGunKargo:obj.ayniGunKargo||false,hedefKar:obj.hedefKar||0.30} : {...obj};
  const f = hesapla.satisFiyati(urunB, ayarlar, 1);
  if(!f) return 0;
  const fiyat = s.gercekFiyat || f.yuvarlak;
  return hesapla.gercekKar(alisTop, fiyat, obj.komisyon||0.04, f.platform, f.kargo).net;
}

function hesaplaRoi(s){
  if(s.snapshot) return s.snapshot.roi;
  const obj = s.tip==='listing' ? listingDB.bul(s.hedefId) : setlerDB.bul(s.hedefId);
  if(!obj) return 0;
  const alisTop = s.tip==='listing' ? (obj.alisFiyati||0) : (obj.alisMaliyeti||0);
  const urunB = s.tip==='set' ? {alisFiyati:obj.alisMaliyeti||0,desi:obj.desi||2,komisyon:obj.komisyon||0.04,ayniGunKargo:obj.ayniGunKargo||false,hedefKar:obj.hedefKar||0.30} : {...obj};
  const f = hesapla.satisFiyati(urunB, ayarlar, 1);
  if(!f) return 0;
  const fiyat = s.gercekFiyat || f.yuvarlak;
  return hesapla.gercekKar(alisTop, fiyat, obj.komisyon||0.04, f.platform, f.kargo).roi;
}

// ── SATIŞ LİSTESİ ────────────────────────────────────────────────
function renderSatisList(){
  const satislar = filtreliSatislar();
  document.getElementById('satis-sayi').textContent = satislar.length + ' kayıt';
  const el = document.getElementById('satis-listesi');
  if(!satislar.length){
    el.innerHTML='<div class="empty-state" style="padding:20px"><div class="empty-icon">🛒</div><div class="empty-title">Bu dönemde satış yok</div></div>';
    return;
  }

  // Tarihe göre grupla
  const gruplar = {};
  satislar.forEach(s=>{ if(!gruplar[s.tarih]) gruplar[s.tarih]=[]; gruplar[s.tarih].push(s); });

  el.innerHTML = Object.entries(gruplar).map(([tarih,gunSatislar]) => {
    const gunKar = gunSatislar.reduce((t,s)=>t+hesaplaKar(s)*s.adet, 0);
    const rows = gunSatislar.map(s => {
      const obj = s.tip==='listing' ? listingDB.bul(s.hedefId) : setlerDB.bul(s.hedefId);
      if(!obj) return '';
      const netKar = hesaplaKar(s);
      const roi = hesaplaRoi(s);
      const toplamKar = netKar * s.adet;
      const kararli = netKar >= 0;
      const fiyat = s.gercekFiyat || 0;
      const snapshotBadge = s.snapshot ? '' : '<span style="font-size:9px;color:var(--t3);margin-left:4px">(anlık)</span>';
      return `<div class="satis-row" id="srow-${s.id}">
        <div class="satis-row-header">
          <div class="satis-avatar">${s.tip==='set'?'📦':'🛍️'}</div>
          <div class="satis-info">
            <div class="satis-ad">${obj.ad}${snapshotBadge}</div>
            <div class="satis-meta">${s.adet} adet · ${p(fiyat)} · ${s.tarih}</div>
          </div>
          <div class="satis-kar">
            <div class="satis-kar-val" style="color:${kararli?'var(--green)':'var(--red)'}">${p(toplamKar)}</div>
            <div style="font-size:10px;color:var(--t3)">ROI %${Math.round(roi*100)}</div>
          </div>
        </div>
        <div class="satis-aksiyonlar">
          <button onclick="editAc('${s.id}')" style="font-size:11px;color:var(--blue);background:var(--blue-l);border:none;border-radius:6px;padding:3px 10px;cursor:pointer">✏ Düzenle</button>
          <button onclick="satisIptal('${s.id}')" style="font-size:11px;color:var(--red);background:var(--red-l);border:none;border-radius:6px;padding:3px 10px;cursor:pointer">✕ İptal</button>
        </div>
        <div id="edit-${s.id}" class="edit-form" style="display:none">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Adet</label>
              <input class="form-input" type="number" id="edit-adet-${s.id}" value="${s.adet}" min="1">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Fiyat (₺)</label>
              <input class="form-input" type="number" id="edit-fiyat-${s.id}" value="${fiyat}" step="0.01">
            </div>
          </div>
          <div class="edit-form-btns mt-8">
            <button class="btn btn-primary btn-sm" onclick="editKaydet('${s.id}')">✓ Kaydet</button>
            <button class="btn btn-secondary btn-sm" onclick="editKapat('${s.id}')">İptal</button>
          </div>
        </div>
      </div>`;
    }).join('');

    const gunLabel = tarih===bugunStr ? 'Bugün' : new Date(tarih+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'long',weekday:'short'});
    return `<div style="margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 6px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:600;color:var(--t3)">${gunLabel}</span>
        <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:${gunKar>=0?'var(--green)':'var(--red)'}">${p(gunKar)}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  renderOzet();
}

// ── DÜZENLEME ────────────────────────────────────────────────────
window.editAc = id => {
  // Açık olanı kapat
  if(editId && editId!==id) editKapat(editId);
  editId = id;
  document.getElementById('edit-'+id).style.display='';
};

window.editKapat = id => {
  document.getElementById('edit-'+id).style.display='none';
  if(editId===id) editId=null;
};

window.editKaydet = id => {
  const yeniAdet = +document.getElementById('edit-adet-'+id).value;
  const yeniFiyat = +document.getElementById('edit-fiyat-'+id).value;
  if(!yeniAdet||yeniAdet<1){ toast('Geçerli adet girin','error'); return; }
  if(!yeniFiyat||yeniFiyat<=0){ toast('Geçerli fiyat girin','error'); return; }
  const ok = satislarDB.guncelle(id, {adet:yeniAdet, gercekFiyat:yeniFiyat});
  if(ok){
    editKapat(id);
    doldurDropdown(); renderSatisList(); renderOzet();
    toast('Satış güncellendi','success');
  } else {
    toast('Satış bulunamadı','error');
  }
};

// ── İPTAL ────────────────────────────────────────────────────────
window.satisIptal = id => {
  const k = satislarDB.hepsini().find(s=>s.id===id);
  if(!k) return;
  const obj = k.tip==='set' ? setlerDB.bul(k.hedefId) : listingDB.bul(k.hedefId);
  if(!confirm('"'+(obj?.ad||'Satış')+'" satışını iptal etmek istiyor musunuz? Stoklar geri yüklenecek.')) return;
  satislarDB.sil(id);
  doldurDropdown(); renderSatisList(); renderOzet();
  toast('Satış iptal edildi, stoklar güncellendi','success');
};

// ── EXCEL ────────────────────────────────────────────────────────
window.excelIndir = async () => {
  const { utils, writeFile } = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
  const data = satislarDB.hepsini().sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(s => {
    const obj = s.tip==='listing' ? listingDB.bul(s.hedefId) : setlerDB.bul(s.hedefId);
    const netKar = hesaplaKar(s);
    const roi = hesaplaRoi(s);
    return {
      'Tarih': s.tarih,
      'Tip': s.tip==='set'?'Set':'Ürün',
      'Ad': obj?.ad||'?',
      'Adet': s.adet,
      'Satış Fiyatı': s.gercekFiyat||0,
      'Birim Net Kar': netKar.toFixed(2),
      'Toplam Net Kar': (netKar*s.adet).toFixed(2),
      'ROI %': Math.round(roi*100),
      'Snapshot': s.snapshot?'Evet':'Hayır (anlık hesap)',
    };
  });
  const ws = utils.json_to_sheet(data);
  const wb = utils.book_new();
  utils.book_append_sheet(wb, ws, 'Satışlar');
  writeFile(wb, 'satislar_'+bugunStr+'.xlsx');
  toast('Excel indirildi','success');
};

// ── TOAST ────────────────────────────────────────────────────────
window.toast = (msg, tip='info') => {
  const c = document.getElementById('toastCont');
  const el = document.createElement('div');
  el.className = 'toast '+tip;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
};

// ── REALTIME GÜNCELLEME ──────────────────────────────────────────
window.addEventListener('tsx_render', () => {
  doldurDropdown();
  renderSatisList();
  renderOzet();
});

// ── BAŞLAT ───────────────────────────────────────────────────────
doldurDropdown();
renderSatisList();
renderOzet();
</script>
</body>
</html>
